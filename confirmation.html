<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Confirmed — Beim Health</title>
<meta name="description" content="Your order is confirmed. Your Care Navigator walks you through what happens next."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060610;--card:rgba(16,16,32,.65);--border:rgba(255,255,255,.07);--cy:#6ee0f5;--pu:#7c6af0;--bl:#6aa3f3;--gn:#3dd9b6;--gd:#f59e0b;--rd:#ef4444;--tx:#f0f0ff;--mu:#8a8da8;--dm:#5a5d78;--radius:20px;--radius-s:14px;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column}
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:160%;height:160%;top:-30%;left:-30%;background:radial-gradient(ellipse 700px 600px at 20% 15%,rgba(61,217,182,.06),transparent 70%),radial-gradient(ellipse 500px 400px at 80% 70%,rgba(110,224,245,.04),transparent 70%);animation:meshDrift 35s ease-in-out infinite alternate}
@keyframes meshDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,-15px) scale(1.02)}}
.noise{position:fixed;inset:0;z-index:0;opacity:.014;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px 128px}

.chat-app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:720px;margin:0 auto;width:100%}

/* ── HEADER ── */
.chat-header{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;backdrop-filter:blur(20px);background:rgba(6,6,16,.88)}
.ch-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0}
.ch-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ch-avatar-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--gn);border:2px solid rgba(6,6,16,.9)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;color:#fff}
.ch-status{font-size:11px;color:var(--gn);font-weight:600}
.step-indicator{display:flex;align-items:center;gap:6px;flex-shrink:0}
.step-dot{width:28px;height:4px;border-radius:4px;background:var(--gn)}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:20px 24px 40px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
.msg{display:flex;gap:10px;animation:msgIn .4s var(--ease) both;max-width:100%}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.bubble{font-size:14px;line-height:1.7;padding:12px 16px;border-radius:18px;max-width:92%;position:relative}
.bubble.nav{color:rgba(240,240,255,.85);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.bubble.nav.ev{background:rgba(110,224,245,.04);border-color:rgba(110,224,245,.1)}
.bubble.nav.br{background:rgba(124,106,240,.04);border-color:rgba(124,106,240,.1)}
.typing-dots{display:flex;gap:4px;padding:12px 16px;border-radius:18px;align-items:center}
.typing-dots.ev{background:rgba(110,224,245,.04);border:1px solid rgba(110,224,245,.1)}
.typing-dots.br{background:rgba(124,106,240,.04);border:1px solid rgba(124,106,240,.1)}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:rgba(240,240,255,.25);animation:dotP 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotP{0%,60%,100%{opacity:.25;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}

/* ── CONFIRMATION CARD ── */
.conf-card{margin-top:10px;padding:16px;background:rgba(61,217,182,.04);border:1px solid rgba(61,217,182,.15);border-radius:16px}
.conf-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.conf-ring{width:42px;height:42px;border-radius:50%;background:rgba(61,217,182,.1);border:2px solid rgba(61,217,182,.3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;animation:ringPulse 2s ease infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(61,217,182,.25)}50%{box-shadow:0 0 0 10px rgba(61,217,182,0)}}
.conf-title{font-size:16px;font-weight:800;color:#fff}
.conf-sub{font-size:11px;color:var(--gn);font-weight:600}
.conf-rows{display:flex;flex-direction:column;gap:5px}
.conf-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.conf-row:last-child{border-bottom:none}
.conf-key{color:var(--mu)}
.conf-val{font-family:'DM Mono',monospace;font-weight:600}
.conf-val.green{color:var(--gn)}.conf-val.gold{color:var(--gd)}.conf-val.cyan{color:var(--cy)}

/* ── FULFILLMENT ITEMS ── */
.ful-item{margin-top:8px;padding:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;display:flex;align-items:flex-start;gap:10px}
.ful-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ful-icon.ship{background:rgba(110,224,245,.08);border:1px solid rgba(110,224,245,.15)}
.ful-icon.digital{background:rgba(124,106,240,.08);border:1px solid rgba(124,106,240,.15)}
.ful-icon.download{background:rgba(61,217,182,.08);border:1px solid rgba(61,217,182,.15)}
.ful-icon.lmn{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15)}
.ful-body{flex:1;min-width:0}
.ful-name{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.ful-status{font-size:10px;color:var(--mu);line-height:1.5}
.ful-status strong{color:var(--tx)}
.ful-action{margin-top:6px;display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.ful-action.access{background:rgba(124,106,240,.1);border:1px solid rgba(124,106,240,.2);color:var(--pu)}
.ful-action.access:hover{background:rgba(124,106,240,.18)}
.ful-action.download{background:rgba(61,217,182,.08);border:1px solid rgba(61,217,182,.18);color:var(--gn)}
.ful-action.download:hover{background:rgba(61,217,182,.14)}
.ful-action.portal{background:rgba(110,224,245,.06);border:1px solid rgba(110,224,245,.15);color:var(--cy)}
.ful-action.portal:hover{background:rgba(110,224,245,.1)}

/* ── CTA BUTTONS ── */
.cta-group{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:all .25s var(--ease);text-align:center}
.cta-btn.primary{background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff}
.cta-btn.primary:hover{box-shadow:0 8px 32px rgba(124,106,240,.3);transform:translateY(-1px)}
.cta-btn.secondary{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--mu)}
.cta-btn.secondary:hover{background:rgba(255,255,255,.08);color:var(--tx)}

/* ── INPUT BAR ── */
.input-bar{flex-shrink:0;display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.06);background:rgba(6,6,16,.92);backdrop-filter:blur(20px);padding:4px 8px}
.input-field{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;padding:14px 16px}
.input-field::placeholder{color:var(--dm)}
.send-btn{background:none;border:none;padding:14px 16px;cursor:pointer;font-size:16px;color:var(--dm);transition:color .2s}
.send-btn:hover{color:var(--cy)}

@media(max-width:680px){.messages{padding:16px 16px 40px}.chat-header{padding:12px 16px}.bubble{font-size:13px;padding:10px 14px;max-width:95%}.step-indicator{display:none}}
</style>
</head>
<body>
<div class="bg-mesh"></div><div class="noise"></div>
<div class="chat-app">
  <div class="chat-header">
    <div class="ch-avatar" id="headerAvatar"></div>
    <div class="ch-info"><div class="ch-name" id="headerName">Care Navigator</div><div class="ch-status" id="headerStatus">Order Confirmed</div></div>
    <div class="step-indicator">
      <div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input class="input-field" id="chatInput" type="text" placeholder="Ask about your order, shipping, LMNs…" autocomplete="off"/>
    <button class="send-btn" onclick="sendFreeText()">➤</button>
  </div>
</div>

<script>
var W='https://beim-health-analyzer.steven-03f.workers.dev';
var W_SMS='https://beim-webhooks.steven-03f.workers.dev';
var AVATARS={everly:'https://cdn.prod.website-files.com/68a9f0181d51caed859528b5/69adc9cb864a991d937219da_Gemini_Generated_Image_uuevmuuevmuuevmu%20(1)%20-%20Edited.png',brooks:'https://cdn.prod.website-files.com/68a9f0181d51caed859528b5/69aee445c428d6a66c5ca3c3_Gemini_Generated_Image_utzzfnutzzfnutzz%20-%20Edited.png'};

var nav,navName,firstName='',email='',phone='',order=null,chatHistory=[];

function sGet(k){try{return sessionStorage.getItem(k)}catch(e){return null}}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

window.addEventListener('DOMContentLoaded',function(){
  nav=sGet('beim_nav')||'brooks';if(nav==='skip')nav='brooks';
  navName=nav==='everly'?'Everly':'Brooks';
  firstName=sGet('beim_first_name')||'';
  email=sGet('beim_email')||'';
  phone=sGet('beim_phone')||'';
  try{order=JSON.parse(sGet('beim_order'))}catch(e){}

  var img=AVATARS[nav]||AVATARS.brooks;
  document.getElementById('headerAvatar').innerHTML='<img src="'+img+'"/><span class="ch-avatar-dot"></span>';
  document.getElementById('headerName').textContent=navName;
  document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendFreeText()}});

  if(!order||!order.products||!order.products.length){
    addNavBubble("I don't see an order on file. Head back to the <a href='products.html' style='color:var(--cy)'>products page</a> to get started.");
    return;
  }
  startConfirmation();
});

function startConfirmation(){
  var name=firstName||'there';
  var t=order.totals||{};
  var prodCount=order.products.length;

  // 1. Celebration message
  addNavBubble("🎉 <strong>"+name+", your order is confirmed!</strong> Everything went through perfectly. Let me walk you through what happens next.");

  // 2. Order summary card
  setTimeout(function(){
    var card='<div class="conf-card"><div class="conf-header"><div class="conf-ring">✓</div><div><div class="conf-title">Order #'+esc(order.orderNum||'')+'</div><div class="conf-sub">'+new Date(order.ts||Date.now()).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'</div></div></div><div class="conf-rows">';
    card+='<div class="conf-row"><span class="conf-key">Products</span><span class="conf-val">'+prodCount+'</span></div>';
    if(t.hsaCov>0)card+='<div class="conf-row"><span class="conf-key">'+(order.acctType||'HSA')+' Charged</span><span class="conf-val green">$'+(t.hsaCov||0).toFixed(2)+'</span></div>';
    if(t.oop>0)card+='<div class="conf-row"><span class="conf-key">Out of Pocket</span><span class="conf-val gold">$'+(t.oop||0).toFixed(2)+'</span></div>';
    if(order.coupon)card+='<div class="conf-row"><span class="conf-key">Promo</span><span class="conf-val cyan">'+esc(order.coupon)+'</span></div>';
    card+='<div class="conf-row"><span class="conf-key">Receipt</span><span class="conf-val">Sent to '+esc(email||'your email')+'</span></div>';
    card+='</div></div>';
    addNavBubble(card);

    // 3. Fulfillment walkthrough
    setTimeout(function(){showFulfillmentSteps()},2000);
  },2200);
}

function showFulfillmentSteps(){
  var products=order.products;
  var physical=[],digitalAccess=[],digitalDownload=[],hybrid=[],lmnProducts=[];

  products.forEach(function(p){
    var ft=(p.fulfillment_type||'').toLowerCase();
    if(p.lmn)lmnProducts.push(p);
    if(ft==='digital_access')digitalAccess.push(p);
    else if(ft==='digital_download')digitalDownload.push(p);
    else if(ft==='hybrid')hybrid.push(p);
    else physical.push(p);
  });

  var hasMultipleTypes=(physical.length>0)+(digitalAccess.length>0)+(digitalDownload.length>0)+(hybrid.length>0)>1;
  var intro="Here's what's happening with each of your products:";
  var items='';

  // Physical products
  physical.forEach(function(p){
    items+='<div class="ful-item"><div class="ful-icon ship">📦</div><div class="ful-body"><div class="ful-name">'+esc(p.name)+'</div><div class="ful-status"><strong>Shipping</strong> — Your order has been placed with the provider. You\'ll receive tracking info via email within 1-3 business days.'+(p.provider_name?' Shipped by '+esc(p.provider_name)+'.':'')+'</div></div></div>';
  });

  // Digital access
  digitalAccess.forEach(function(p){
    var url=p.fulfillment_url||'';
    var instr=p.fulfillment_instructions||'Check your email for activation details.';
    items+='<div class="ful-item"><div class="ful-icon digital">🔗</div><div class="ful-body"><div class="ful-name">'+esc(p.name)+'</div><div class="ful-status"><strong>Digital Access</strong> — '+esc(instr)+'</div>'+(url?'<a href="'+esc(url)+'" target="_blank" class="ful-action access">🔗 Access Now →</a>':'')+'</div></div>';
  });

  // Digital downloads
  digitalDownload.forEach(function(p){
    var url=p.fulfillment_url||'';
    var instr=p.fulfillment_instructions||'Your download is ready.';
    items+='<div class="ful-item"><div class="ful-icon download">📄</div><div class="ful-body"><div class="ful-name">'+esc(p.name)+'</div><div class="ful-status"><strong>Download</strong> — '+esc(instr)+'</div>'+(url?'<a href="'+esc(url)+'" target="_blank" class="ful-action download">📥 Download Now →</a>':'')+'</div></div>';
  });

  // Hybrid
  hybrid.forEach(function(p){
    var instr=p.fulfillment_instructions||'Kit ships to you. Results delivered digitally.';
    items+='<div class="ful-item"><div class="ful-icon ship">🧪</div><div class="ful-body"><div class="ful-name">'+esc(p.name)+'</div><div class="ful-status"><strong>Kit + Digital</strong> — '+esc(instr)+'</div></div></div>';
  });

  addNavBubble(intro+items);

  // 4. LMN status
  if(lmnProducts.length>0){
    setTimeout(function(){
      var lmnPath=order.lmnPath||'beim';
      var lmnMsg='';
      if(lmnPath==='beim'){
        lmnMsg='<div class="ful-item"><div class="ful-icon lmn">🩺</div><div class="ful-body"><div class="ful-name">Letter of Medical Necessity</div><div class="ful-status"><strong>'+lmnProducts.length+' product'+(lmnProducts.length>1?'s':'')+' need an LMN.</strong> A Beim network physician will review and sign within ~4 hours. You\'ll need to complete a short health intake — takes about 90 seconds.</div><a href="https://go.beim.ai/portal" class="ful-action portal">📋 Complete Health Intake →</a></div></div>';
      } else if(lmnPath==='own'){
        lmnMsg='<div class="ful-item"><div class="ful-icon lmn">🩺</div><div class="ful-body"><div class="ful-name">Letter of Medical Necessity</div><div class="ful-status"><strong>Your pre-filled LMN is ready.</strong> Download it, have your doctor review and sign, then submit to your HSA administrator.</div><a href="#" onclick="generateLmnTemplate();return false" class="ful-action download">📄 Download LMN Template</a></div></div>';
      } else {
        lmnMsg='<div class="ful-item"><div class="ful-icon lmn">🩺</div><div class="ful-body"><div class="ful-name">Letter of Medical Necessity</div><div class="ful-status"><strong>You indicated you have an LMN.</strong> Make sure it\'s on file with your HSA administrator to ensure reimbursement.</div></div></div>';
      }
      addNavBubble(lmnMsg);
      setTimeout(function(){showClosingMessage()},2000);
    },2500);
  } else {
    setTimeout(function(){showClosingMessage()},2500);
  }
}

function showClosingMessage(){
  var hasPhone=!!phone;
  var msg="That's everything, "+(firstName||'friend')+". ";

  if(hasPhone){
    msg+="I've texted you a confirmation too, so you've got everything on your phone. Remember — <strong>you can text me anytime</strong> with questions about your products, shipping, LMNs, or your HSA. I'm always here.";
  } else {
    msg+="Your receipt and any tracking info will come to <strong>"+esc(email||'your email')+"</strong>.";
  }

  var ctas='<div class="cta-group">';
  var hasLmn=order.products.some(function(p){return p.lmn});
  if(hasLmn&&(order.lmnPath||'beim')==='beim'){
    ctas+='<a href="https://go.beim.ai/portal" class="cta-btn primary">📋 Complete Health Intake (90 sec) →</a>';
  }
  ctas+='<a href="https://go.beim.ai/marketplace" class="cta-btn secondary">🛒 Browse More Products</a>';
  ctas+='<a href="https://go.beim.ai/start" class="cta-btn secondary">🔄 Start a New Session</a>';
  ctas+='</div>';

  addNavBubble(msg+ctas);

  // Send confirmation SMS if phone captured
  if(hasPhone){
    sendConfirmationSMS();
  }
}

/* ── SMS CONFIRMATION ── */
function sendConfirmationSMS(){
  var t=order.totals||{};
  var prodNames=order.products.map(function(p){return p.name}).slice(0,3).join(', ');
  if(order.products.length>3)prodNames+=' + '+(order.products.length-3)+' more';

  // The Stripe webhook in beim-webhooks already sends an SMS on payment_intent.succeeded,
  // but we send a softer navigator-style follow-up here
  var lid=sGet('beim_lead_id')||null;
  var planUrl='https://go.beim.ai/portal';

  fetch(W_SMS+'/api/twilio/send-plan',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      phone:phone,first_name:firstName,navigator:nav,
      product_count:order.products.length,
      plan_url:planUrl,lead_id:lid
    })
  }).catch(function(){/* non-critical */});
}

/* ── LMN TEMPLATE (same as checkout) ── */
function generateLmnTemplate(){
  var prods=(order.products||[]).filter(function(p){return p.lmn});
  var fn=firstName||'[Name]',ln=sGet('beim_last_name')||'';
  var dob=sGet('beim_dob')||'[DOB]';
  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var rows=prods.map(function(p){return'<tr><td>'+esc(p.name)+'</td><td>'+esc(p.cat||'')+'</td><td>'+esc(p.conds||'')+'</td><td>$'+(p.price||0).toFixed(2)+'</td></tr>'}).join('');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Letter of Medical Necessity</title><style>body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;font-size:13px;line-height:1.7}h1{font-size:20px}table{width:100%;border-collapse:collapse;margin:16px 0}th{background:#f3f4f6;padding:8px;text-align:left;font-size:11px;text-transform:uppercase;border-bottom:2px solid #e5e7eb}td{padding:8px;border-bottom:1px solid #f3f4f6}.sig{border-bottom:1px solid #111;width:280px;margin:30px 0 4px;display:inline-block}@media print{button{display:none}}</style></head><body><div style="color:#7c6af0;font-weight:800;font-size:16px">Beim Health</div><h1>Letter of Medical Necessity</h1><p>Date: '+date+'</p><p><strong>Patient:</strong> '+esc(fn+' '+ln)+'<br><strong>DOB:</strong> '+esc(dob)+'</p><p>The following products are medically necessary under IRC §213(d) and IRS Publication 502.</p><table><thead><tr><th>Product</th><th>Category</th><th>Conditions</th><th>Price</th></tr></thead><tbody>'+rows+'</tbody></table><p><strong>Medical Justification:</strong> The listed products directly treat, mitigate, or prevent the conditions noted.</p><div style="margin-top:40px"><p><strong>Physician Signature:</strong></p><span class="sig"></span><p style="font-size:11px;color:#888">Printed Name / NPI / Date</p></div><p style="font-size:10px;color:#888;margin-top:30px">Auto-generated by Beim Health.</p><script>window.print()<\/script></body></html>';
  window.open(URL.createObjectURL(new Blob([html],{type:'text/html'})),'_blank');
}

/* ── CHAT ── */
function addNavBubble(html){
  chatHistory.push({role:'nav',text:html});
  var img=AVATARS[nav]||AVATARS.brooks,cls=nav==='everly'?'ev':'br';
  var c=document.getElementById('messages'),d=document.createElement('div');d.className='msg';
  d.innerHTML='<div class="msg-avatar"><img src="'+img+'"/></div><div class="bubble nav '+cls+'">'+html+'</div>';
  c.appendChild(d);scrollToBottom();
}
function showTyping(){
  var img=AVATARS[nav]||AVATARS.brooks,cls=nav==='everly'?'ev':'br';
  var c=document.getElementById('messages'),d=document.createElement('div');d.className='msg';d.id='typingMsg';
  d.innerHTML='<div class="msg-avatar"><img src="'+img+'"/></div><div class="typing-dots '+cls+'"><span></span><span></span><span></span></div>';
  c.appendChild(d);scrollToBottom();
}
function removeTyping(){var el=document.getElementById('typingMsg');if(el)el.remove()}
function scrollToBottom(){var c=document.getElementById('messages');setTimeout(function(){c.scrollTop=c.scrollHeight},60)}

function sendFreeText(){
  var input=document.getElementById('chatInput'),text=input.value.trim();if(!text)return;input.value='';
  chatHistory.push({role:'user',text:text});
  var c=document.getElementById('messages'),d=document.createElement('div');d.className='msg user';
  d.innerHTML='<div class="msg-avatar" style="background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--mu);font-weight:600">You</div><div class="bubble usr">'+esc(text)+'</div>';
  c.appendChild(d);scrollToBottom();
  showTyping();

  var prodList=(order.products||[]).map(function(p){return p.name+' ($'+p.price+', '+p.grade+')'}).join(', ');
  fetch(W+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    message:text,history:chatHistory.slice(-6),navigator:nav,
    context:{page:'checkout',balance:order.balance||0,acctType:order.acctType||'HSA',firstName:firstName,selectedProducts:prodList}
  })}).then(function(r){return r.json()}).then(function(d){removeTyping();addNavBubble(d.reply||'Ask me anything about your order.')})
  .catch(function(){removeTyping();addNavBubble('I hit a snag — try again.')});
}
</script>
</body>
</html>
