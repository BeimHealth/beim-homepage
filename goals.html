<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Health Goals — Beim Health</title>
<meta name="description" content="Have a conversation with your Care Navigator about your health priorities. No forms — just a guided conversation that matches you to the right products."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060610;--card:rgba(16,16,32,.65);--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.14);--cy:#6ee0f5;--pu:#7c6af0;--bl:#6aa3f3;--gn:#3dd9b6;--gd:#f59e0b;--rd:#ef4444;--tx:#f0f0ff;--mu:#8a8da8;--dm:#5a5d78;--radius:20px;--radius-s:14px;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column}
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:160%;height:160%;top:-30%;left:-30%;background:radial-gradient(ellipse 700px 600px at 20% 15%,rgba(124,106,240,.06),transparent 70%),radial-gradient(ellipse 500px 400px at 80% 70%,rgba(110,224,245,.04),transparent 70%);animation:meshDrift 35s ease-in-out infinite alternate}
@keyframes meshDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,-15px) scale(1.02)}}
.noise{position:fixed;inset:0;z-index:0;opacity:.014;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px 128px}
.chat-app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto;width:100%}
.chat-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;backdrop-filter:blur(20px);background:rgba(6,6,16,.85)}
.ch-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--mu);text-decoration:none;font-size:14px;transition:all .2s;flex-shrink:0}
.ch-back:hover{border-color:var(--border-h);color:var(--tx)}
.ch-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0}
.ch-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ch-avatar-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--gn);border:2px solid rgba(6,6,16,.9)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;color:#fff}
.ch-status{font-size:11px;color:var(--gn);font-weight:600}
.step-indicator{display:flex;align-items:center;gap:6px}
.step-dot{width:28px;height:4px;border-radius:4px;background:rgba(255,255,255,.06);transition:all .4s var(--ease)}
.step-dot.done{background:var(--gn)}
.step-dot.active{background:linear-gradient(90deg,var(--cy),var(--pu));width:40px;box-shadow:0 0 12px rgba(110,224,245,.15)}
.messages{flex:1;overflow-y:auto;padding:20px 24px 100px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
.msg{display:flex;gap:10px;animation:msgIn .4s var(--ease) both;max-width:100%}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-avatar.you{background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--mu);font-weight:600}
.bubble{font-size:14px;line-height:1.7;padding:12px 16px;border-radius:18px;max-width:92%;position:relative}
.bubble.nav{color:rgba(240,240,255,.85);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.bubble.nav.ev{background:rgba(110,224,245,.04);border-color:rgba(110,224,245,.1)}
.bubble.nav.br{background:rgba(124,106,240,.04);border-color:rgba(124,106,240,.1)}
.bubble.usr{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.75)}
.typing-dots{display:flex;gap:4px;padding:12px 16px;border-radius:18px;align-items:center}
.typing-dots.ev{background:rgba(110,224,245,.04);border:1px solid rgba(110,224,245,.1)}
.typing-dots.br{background:rgba(124,106,240,.04);border:1px solid rgba(124,106,240,.1)}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:rgba(240,240,255,.25);animation:dotPulse 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotPulse{0%,60%,100%{opacity:.25;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.goal-section{margin-top:10px}
.goal-tier-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dm);margin-bottom:6px;margin-top:12px}
.goal-tier-label:first-child{margin-top:0}
.goal-chips{display:flex;flex-wrap:wrap;gap:6px}
.goal-chip{font-size:12px;font-weight:600;padding:9px 16px;border-radius:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.7);cursor:pointer;transition:all .25s var(--ease);user-select:none}
.goal-chip:hover{border-color:rgba(124,106,240,.35);background:rgba(124,106,240,.05);color:#fff}
.goal-chip.selected{border-color:rgba(124,106,240,.5);background:rgba(124,106,240,.1);color:#fff;box-shadow:0 0 14px rgba(124,106,240,.12)}
.goal-chip.maxed{opacity:.25;pointer-events:none}
.goal-chip.locked{pointer-events:none;opacity:.8}
.goal-counter{font-size:11px;color:var(--dm);margin-top:10px}
.goal-counter strong{color:var(--tx)}
.sub-section{margin-top:10px}
.sub-goal-label{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sub-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.sub-chip{font-size:11px;font-weight:600;padding:7px 14px;border-radius:100px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:rgba(240,240,255,.6);cursor:pointer;transition:all .22s var(--ease)}
.sub-chip:hover{border-color:rgba(110,224,245,.3);color:var(--tx)}
.sub-chip.selected{border-color:rgba(110,224,245,.4);background:rgba(110,224,245,.06);color:var(--cy)}
.sub-chip.locked{pointer-events:none;opacity:.8}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);margin-bottom:6px;transition:all .2s}
.rank-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.rank-num.r1{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--gd)}
.rank-num.r2{background:rgba(124,106,240,.1);border:1px solid rgba(124,106,240,.25);color:var(--pu)}
.rank-num.r3{background:rgba(110,224,245,.08);border:1px solid rgba(110,224,245,.2);color:var(--cy)}
.rank-label{font-size:13px;font-weight:600;color:#fff;flex:1}
.rank-arrows{display:flex;flex-direction:column;gap:2px}
.rank-arrow{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--mu);width:24px;height:20px;border-radius:6px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:all .15s}
.rank-arrow:hover{border-color:rgba(255,255,255,.2);color:var(--tx);background:rgba(255,255,255,.08)}
.rank-arrow.disabled{opacity:.15;pointer-events:none}
.pref-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pref-btn{font-size:12px;font-weight:600;padding:10px 18px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.7);cursor:pointer;transition:all .25s var(--ease);text-align:center;flex:1;min-width:120px}
.pref-btn:hover{border-color:rgba(124,106,240,.3);background:rgba(124,106,240,.04);color:#fff}
.pref-btn.selected{border-color:rgba(124,106,240,.5);background:rgba(124,106,240,.1);color:#fff}
.pref-btn.locked{pointer-events:none;opacity:.8}
.slider-wrap{margin-top:12px}
.slider-row{display:flex;align-items:center;gap:14px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:rgba(255,255,255,.08);outline:none;cursor:pointer}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--pu),var(--bl));border:2px solid rgba(255,255,255,.15);cursor:pointer;box-shadow:0 2px 12px rgba(124,106,240,.3)}
.slider-val{font-size:16px;font-weight:700;color:var(--cy);min-width:32px;text-align:center;font-family:'DM Mono',monospace}
.slider-labels{display:flex;justify-content:space-between;margin-top:4px}
.slider-labels span{font-size:9px;color:var(--dm);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.action-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:11px 22px;border-radius:100px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .25s var(--ease)}
.action-btn:hover{box-shadow:0 6px 28px rgba(124,106,240,.3);transform:translateY(-1px)}
.action-btn:disabled{opacity:.3;pointer-events:none}
.action-btn.locked{pointer-events:none;opacity:.35}
.summary-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin-top:12px}
.sum-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sum-row:last-child{border-bottom:none}
.sum-icon{font-size:16px}
.sum-label{font-size:13px;font-weight:600;color:#fff;flex:1}
.sum-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px}
.sum-badge.primary{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--gd)}
.sum-badge.secondary{background:rgba(124,106,240,.08);border:1px solid rgba(124,106,240,.18);color:var(--pu)}
.sum-badge.tertiary{background:rgba(110,224,245,.06);border:1px solid rgba(110,224,245,.15);color:var(--cy)}
.sum-subs{font-size:10px;color:var(--dm);margin-top:2px}
.wb-meter{margin-top:12px;padding:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px}
.wb-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dm);margin-bottom:8px}
.wb-bar-wrap{height:8px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:6px}
.wb-bar-fill{height:100%;border-radius:8px;transition:width .8s var(--ease)}
.wb-row{display:flex;justify-content:space-between;align-items:center}
.wb-label{font-size:11px;color:var(--mu)}.wb-value{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
.pref-summary{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.pref-tag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--mu)}
.input-bar{flex-shrink:0;display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.06);background:rgba(6,6,16,.92);backdrop-filter:blur(20px);padding:4px 8px}
.input-field{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;padding:14px 16px}
.input-field::placeholder{color:var(--dm)}
.send-btn{background:none;border:none;padding:14px 16px;cursor:pointer;font-size:16px;color:var(--dm);transition:color .2s}
.send-btn:hover{color:var(--cy)}
.bottom-cta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:10;padding:16px 24px;background:linear-gradient(to top,var(--bg) 70%,transparent);justify-content:center}
.bottom-cta.show{display:flex}
.bottom-cta-btn{width:100%;max-width:640px;padding:16px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;border-radius:var(--radius-s);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;gap:8px}
.bottom-cta-btn:hover{box-shadow:0 12px 48px rgba(124,106,240,.3);transform:translateY(-2px)}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){
  .messages{padding:16px 16px 100px}
  .chat-header{padding:12px 16px}
  .input-bar{padding:4px 4px}
  .bubble{font-size:13px;padding:10px 14px;max-width:95%}
}
</style>
</head>
<body>
<div class="bg-mesh"></div><div class="noise"></div>

<div class="chat-app">
  <div class="chat-header">
    <a class="ch-back" href="insurance.html" title="Back">&larr;</a>
    <div class="ch-avatar" id="headerAvatar"></div>
    <div class="ch-info">
      <div class="ch-name" id="headerName">Care Navigator</div>
      <div class="ch-status">Online now</div>
    </div>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <input class="input-field" id="chatInput" type="text" placeholder="Ask anything about your goals…" autocomplete="off"/>
    <button class="send-btn" onclick="sendFreeText()">&#10148;</button>
  </div>
</div>

<div class="bottom-cta" id="bottomCta">
  <button class="bottom-cta-btn" onclick="goToProducts()">Find My Products &rarr;</button>
</div>

<script>
var W='https://beim-health-analyzer.steven-03f.workers.dev';
var AVATARS={everly:'https://cdn.prod.website-files.com/68a9f0181d51caed859528b5/69adc9cb864a991d937219da_Gemini_Generated_Image_uuevmuuevmuuevmu%20(1)%20-%20Edited.png',brooks:'https://cdn.prod.website-files.com/68a9f0181d51caed859528b5/69aee445c428d6a66c5ca3c3_Gemini_Generated_Image_utzzfnutzzfnutzz%20-%20Edited.png'};

var GOALS=[
  {id:'screenings',icon:'\uD83E\uDE7A',label:'Screenings & Labs',tier:'Preventive',subs:['Blood work','Cancer screening','Vision exam','Dental cleaning','Hearing test','STI screening','Skin check']},
  {id:'vaccines',icon:'\uD83D\uDC89',label:'Vaccines & Immunizations',tier:'Preventive',subs:['Flu shot','COVID booster','Shingles','HPV','Tetanus','Travel vaccines']},
  {id:'primary',icon:'\uD83C\uDFE5',label:'Doctor Visits & Primary Care',tier:'Care',subs:['Annual wellness visit','Specialist referral','Chronic care follow-up','Telehealth visit']},
  {id:'chronic',icon:'\uD83D\uDCCB',label:'Chronic Condition Management',tier:'Care',subs:['Weight management','Diabetes/blood sugar','Heart & blood pressure','Hormones & thyroid','Autoimmune']},
  {id:'mental',icon:'\uD83E\uDDE0',label:'Mental Health & Stress',tier:'Mental & Recovery',subs:['Therapy/counseling','Anxiety','Sleep quality','Burnout & stress','ADHD/focus']},
  {id:'recovery',icon:'\uD83C\uDFCB\uFE0F',label:'Recovery & Physical Therapy',tier:'Mental & Recovery',subs:['Injury recovery','Post-surgery rehab','Chronic pain','Athletic performance','Mobility']},
  {id:'supplements',icon:'\uD83D\uDC8A',label:'Supplements & Nutrition',tier:'Wellness',subs:['Vitamins & minerals','Gut health','Protein & fitness','Adaptogens','Probiotics']},
  {id:'wellness',icon:'\u2728',label:'Skin, Hair & Anti-Aging',tier:'Wellness',subs:['Hair loss','Skincare','Anti-aging','Acne','Sun protection']},
  {id:'devices',icon:'\u231A',label:'Wellness Tech & Devices',tier:'Wellness',subs:['Wearables','Recovery devices','Sleep tech','Light therapy','Air quality']},
  {id:'energy',icon:'\u26A1',label:'Energy & Optimization',tier:'Wellness',subs:['Energy & focus','Nootropics','Fertility','Sexual health','Longevity']}
];

/* ── Fallback strings (one per goalStep) ── */
var FALLBACKS={
  goals_selected:'Good picks. Let me get more specific \u2014 tag anything that applies within each goal so I can dial in the product matches.',
  subs_tagged:'Got it. Now rank your 3 goals \u2014 #1 gets the heaviest weight when I score products for you. Use the arrows to reorder.',
  ranked:'Locked in. Quick question \u2014 what kind of products are you looking for? This helps me calibrate price vs quantity.',
  budget_set:'Got it. Have you used your HSA or FSA for wellness products before? Helps me know how much to explain as we go.',
  experience_set:'Almost done \u2014 I need a quick baseline on how you\u2019re feeling right now. This isn\u2019t a quiz \u2014 it\u2019s how I\u2019ll measure whether the products we pick are actually making a difference over time.<br><br><strong>On a scale of 1\u201310, how satisfied are you with your life overall?</strong><br><span style="font-size:11px;color:var(--dm)">Work, relationships, daily life \u2014 the big picture.</span>',
  wb_life:'Got it \u2014 that\u2019s your starting point. <strong>Now, how\u2019s your energy and motivation on a typical day?</strong><br><span style="font-size:11px;color:var(--dm)">This helps me prioritize products that target energy, sleep, and focus.</span>',
  wb_energy:'Baseline locked in. I\u2019ll check back on these numbers after you\u2019ve been using your products \u2014 that\u2019s how we\u2019ll know what\u2019s working.',
  summary:'Your profile is set \u2014 goals, preferences, and your well-being baseline are all locked in. I\u2019ll use this to match products now and track your progress over time. Hit <strong>Find My Products</strong> when you\u2019re ready.'
};

var nav,navName='',firstName='',lastName='',employer='',email='',bal=0,acct='HSA',deadline='',hasIns=false;
var chatHistory=[],chatLog=[];
var selected=[],ranked=[],subSelected={};
var wellbeing={life:0,energy:0};
var budgetPref='',expLevel='';
var STEP=0;

function sGet(k){try{return sessionStorage.getItem(k)}catch(e){return null}}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function goalObj(id){return GOALS.find(function(x){return x.id===id})}
function goalLabel(id){var g=goalObj(id);return g?g.label:id}

/* ══════════════════════════════════════════
   AI REACTION ENGINE
   Single swap point for future Voiceflow migration.
   Replace the fetch call inside this function with
   a Voiceflow interact API call when ready.
   ══════════════════════════════════════════ */
function getAIReaction(goalStep,extraUI,callback){
  showTyping();
  var ctx={
    page:'goals',goalStep:goalStep,
    firstName:firstName,employer:employer,
    balance:bal,acctType:acct,deadline:deadline,
    goals:selected.map(function(id){return goalLabel(id)}),
    goalIds:selected,
    ranked:ranked.map(function(id){return goalLabel(id)}),
    rankedIds:ranked,
    subGoals:subSelected,
    budgetPref:budgetPref,expLevel:expLevel,
    wellbeing:wellbeing,
    hasInsurance:hasIns
  };
  var controller=new AbortController();
  var timeout=setTimeout(function(){controller.abort()},4000);

  fetch(W+'/api/chat',{
    method:'POST',signal:controller.signal,
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:'[goalStep:'+goalStep+']',history:chatHistory.slice(-6),navigator:nav,context:ctx})
  })
  .then(function(r){clearTimeout(timeout);return r.json()})
  .then(function(d){
    removeTyping();
    var reply=d.reply||FALLBACKS[goalStep]||'Let\u2019s keep going.';
    addNavBubble(reply,extraUI);
    if(callback)callback();
  })
  .catch(function(){
    clearTimeout(timeout);removeTyping();
    addNavBubble(FALLBACKS[goalStep]||'Let\u2019s keep going.',extraUI);
    if(callback)callback();
  });
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',function(){
  var p=new URLSearchParams(location.search);
  nav=p.get('nav')||sGet('beim_nav')||'brooks';if(nav==='skip')nav='brooks';
  navName=nav==='everly'?'Everly':'Brooks';
  firstName=p.get('first_name')?decodeURIComponent(p.get('first_name')):(sGet('beim_first_name')||'');
  lastName=p.get('last_name')?decodeURIComponent(p.get('last_name')):(sGet('beim_last_name')||'');
  employer=p.get('employer')?decodeURIComponent(p.get('employer')):(sGet('beim_employer')||'');
  email=p.get('email')?decodeURIComponent(p.get('email')):(sGet('beim_email')||'');
  bal=parseFloat(p.get('balance'))||0;acct=p.get('acct')||'HSA';
  deadline=p.get('deadline')||sGet('beim_fsa_deadline')||'';
  hasIns=p.get('benefits')==='verified';

  var img=AVATARS[nav]||AVATARS.brooks;
  document.getElementById('headerAvatar').innerHTML='<img src="'+img+'"/><span class="ch-avatar-dot"></span>';
  document.getElementById('headerName').textContent=navName;

  document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendFreeText()}});

  setTimeout(startConversation,500);
});

/* ── CHAT CORE ── */
function addNavBubble(html,extra){
  chatHistory.push({role:'nav',text:html});
  chatLog.push({t:Date.now(),r:'nav',m:(html+(extra||'')).replace(/<[^>]+>/g,'')});
  var img=AVATARS[nav]||AVATARS.brooks,cls=nav==='everly'?'ev':'br';
  var container=document.getElementById('messages');
  var div=document.createElement('div');div.className='msg';
  div.innerHTML='<div class="msg-avatar"><img src="'+img+'"/></div><div class="bubble nav '+cls+'">'+html+(extra||'')+'</div>';
  container.appendChild(div);scrollToBottom();
}
function addUserBubble(text){
  chatHistory.push({role:'user',text:text});
  chatLog.push({t:Date.now(),r:'user',m:text});
  var container=document.getElementById('messages');
  var div=document.createElement('div');div.className='msg user';
  div.innerHTML='<div class="msg-avatar you">You</div><div class="bubble usr">'+esc(text)+'</div>';
  container.appendChild(div);scrollToBottom();
}
function showTyping(){
  var img=AVATARS[nav]||AVATARS.brooks,cls=nav==='everly'?'ev':'br';
  var container=document.getElementById('messages');
  var div=document.createElement('div');div.className='msg';div.id='typingMsg';
  div.innerHTML='<div class="msg-avatar"><img src="'+img+'"/></div><div class="typing-dots '+cls+'"><span></span><span></span><span></span></div>';
  container.appendChild(div);scrollToBottom();
}
function removeTyping(){var el=document.getElementById('typingMsg');if(el)el.remove()}
function scrollToBottom(){var c=document.getElementById('messages');setTimeout(function(){c.scrollTop=c.scrollHeight},60)}
function lockAll(){
  document.querySelectorAll('.goal-chip:not(.locked),.sub-chip:not(.locked),.pref-btn:not(.locked)').forEach(function(c){c.classList.add('locked')});
  document.querySelectorAll('.action-btn:not(.locked)').forEach(function(b){b.classList.add('locked');b.disabled=true});
  document.querySelectorAll('.rank-arrow').forEach(function(a){a.classList.add('disabled')});
}

/* ══════════════════════════════════════════
   CONVERSATION FLOW
   ══════════════════════════════════════════ */

function startConversation(){
  STEP=0;
  // Continuation tone — no intro, they already know each other
  var balStr=bal>0?' You\'ve got <strong>$'+bal.toLocaleString()+' '+acct+'</strong> to work with.':'';
  var insStr=hasIns?' Insurance is verified \u2014 I\'ll use it first.':'';
  addNavBubble('Alright'+(firstName?', '+esc(firstName):'')+' \u2014 let\u2019s figure out what matters most to you.'+balStr+insStr+' I need to ask you a few things so I can match you with the right products. About 2 minutes.');
  // Second bubble with goal chips — scripted (no AI needed before user input)
  showTyping();
  setTimeout(function(){
    removeTyping();
    addNavBubble('<strong>Pick your top 3 health priorities</strong> from below. I organized them by type, but pick whatever matters most to you.',buildGoalChips());
    STEP=1;
  },1600);
}

/* ── STEP 1: GOAL SELECTION ── */
function buildGoalChips(){
  var tiers=[
    {label:'Screenings & Preventive',ids:['screenings','vaccines']},
    {label:'Care & Management',ids:['primary','chronic']},
    {label:'Mental Health & Recovery',ids:['mental','recovery']},
    {label:'Wellness & Optimization',ids:['supplements','wellness','devices','energy']}
  ];
  var html='<div class="goal-section">';
  tiers.forEach(function(tier){
    html+='<div class="goal-tier-label">'+tier.label+'</div><div class="goal-chips">';
    tier.ids.forEach(function(id){var g=goalObj(id);html+='<span class="goal-chip" data-goal="'+id+'" onclick="pickGoal(this,\''+id+'\')">'+g.icon+' '+g.label+'</span>'});
    html+='</div>';
  });
  html+='<div class="goal-counter" id="goalCounter"><strong>0</strong> of 3 selected</div>';
  html+='<button class="action-btn" id="goalConfirmBtn" disabled onclick="confirmGoals()">Confirm My 3 Goals</button>';
  html+='</div>';
  return html;
}
function pickGoal(el,id){
  var idx=selected.indexOf(id);
  if(idx>-1){selected.splice(idx,1);el.classList.remove('selected')}
  else{if(selected.length>=3)return;selected.push(id);el.classList.add('selected')}
  var counter=document.getElementById('goalCounter');
  if(counter)counter.innerHTML='<strong>'+selected.length+'</strong> of 3 selected';
  document.querySelectorAll('.goal-chip').forEach(function(c){
    if(selected.length>=3&&!c.classList.contains('selected'))c.classList.add('maxed');
    else c.classList.remove('maxed');
  });
  var btn=document.getElementById('goalConfirmBtn');if(btn)btn.disabled=selected.length<3;
}
function confirmGoals(){
  lockAll();
  var names=selected.map(function(id){var g=goalObj(id);return g.icon+' '+g.label}).join(', ');
  addUserBubble('My top 3: '+names);
  STEP=2;
  // AI reacts to the combination, then shows sub-goal chips
  getAIReaction('goals_selected',buildSubChips());
}

/* ── STEP 2: SUB-GOALS ── */
function buildSubChips(){
  var html='<div class="sub-section">';
  selected.forEach(function(id){
    var g=goalObj(id);if(!g)return;subSelected[id]=[];
    html+='<div class="sub-goal-label">'+g.icon+' '+g.label+'</div><div class="sub-chips">';
    g.subs.forEach(function(s){html+='<span class="sub-chip" data-sg="'+id+'" onclick="pickSub(this,\''+id+'\',\''+esc(s)+'\')">'+s+'</span>'});
    html+='</div>';
  });
  html+='<button class="action-btn" onclick="confirmSubs()">Continue \u2192</button></div>';
  return html;
}
function pickSub(el,goalId,sub){
  if(!subSelected[goalId])subSelected[goalId]=[];
  var arr=subSelected[goalId],idx=arr.indexOf(sub);
  if(idx>-1){arr.splice(idx,1);el.classList.remove('selected')}
  else{arr.push(sub);el.classList.add('selected')}
}
function confirmSubs(){
  lockAll();
  var allSubs=[];selected.forEach(function(id){if(subSelected[id])subSelected[id].forEach(function(s){allSubs.push(s)})});
  addUserBubble(allSubs.length?'Specifics: '+allSubs.join(', '):'Keeping it broad \u2014 no specifics.');
  ranked=selected.slice();
  STEP=3;
  getAIReaction('subs_tagged',buildRanker());
}

/* ── STEP 3: RANKING ── */
function buildRanker(){
  var html='<div id="rankContainer">'+renderRankItems()+'</div>';
  html+='<button class="action-btn" onclick="confirmRank()">Lock In Rankings \u2192</button>';
  return html;
}
function renderRankItems(){
  var cls=['r1','r2','r3'],html='';
  ranked.forEach(function(id,i){
    var g=goalObj(id);
    html+='<div class="rank-item"><div class="rank-num '+cls[i]+'">'+(i+1)+'</div><span class="sum-icon">'+g.icon+'</span><span class="rank-label">'+g.label+'</span><div class="rank-arrows">';
    html+='<button class="rank-arrow'+(i===0?' disabled':'')+'" onclick="moveRank('+i+',-1)">\u25B2</button>';
    html+='<button class="rank-arrow'+(i===ranked.length-1?' disabled':'')+'" onclick="moveRank('+i+',1)">\u25BC</button>';
    html+='</div></div>';
  });
  return html;
}
function moveRank(i,d){
  var n=i+d;if(n<0||n>=ranked.length)return;
  var t=ranked[i];ranked[i]=ranked[n];ranked[n]=t;
  var wrap=document.getElementById('rankContainer');if(wrap)wrap.innerHTML=renderRankItems();
}
function confirmRank(){
  lockAll();
  addUserBubble(ranked.map(function(id,i){var g=goalObj(id);return'#'+(i+1)+' '+g.icon+' '+g.label}).join(', '));
  STEP=4;
  getAIReaction('ranked',buildBudgetPrefs());
}

/* ── STEP 4: BUDGET & EXPERIENCE ── */
function buildBudgetPrefs(){
  var html='<div class="pref-row">';
  html+='<span class="pref-btn" onclick="pickBudget(\'premium\',this)">\uD83C\uDFAF Fewer, premium products</span>';
  html+='<span class="pref-btn" onclick="pickBudget(\'value\',this)">\uD83D\uDCB0 More products, best value</span>';
  html+='<span class="pref-btn" onclick="pickBudget(\'mix\',this)">\u2696\uFE0F Mix of both</span>';
  html+='</div>';
  return html;
}
function pickBudget(val,el){
  budgetPref=val;
  document.querySelectorAll('.pref-btn').forEach(function(b){b.classList.remove('selected')});
  el.classList.add('selected');
  lockAll();
  var labels={premium:'Fewer, premium products',value:'More products, best value',mix:'Mix of both'};
  addUserBubble(labels[val]);
  getAIReaction('budget_set',buildExpPrefs());
}
function buildExpPrefs(){
  var html='<div class="pref-row">';
  html+='<span class="pref-btn" onclick="pickExp(\'new\',this)">\uD83C\uDD95 This is new to me</span>';
  html+='<span class="pref-btn" onclick="pickExp(\'some\',this)">\uD83D\uDC4D Some experience</span>';
  html+='<span class="pref-btn" onclick="pickExp(\'pro\',this)">\uD83C\uDFC6 I know my way around</span>';
  html+='</div>';
  return html;
}
function pickExp(val,el){
  expLevel=val;
  document.querySelectorAll('.pref-btn').forEach(function(b){b.classList.remove('selected')});
  el.classList.add('selected');
  lockAll();
  var labels={'new':'This is new to me','some':'Some experience','pro':'I know my way around'};
  addUserBubble(labels[val]);
  STEP=5;
  // AI reacts to experience + transitions to well-being + shows first slider
  getAIReaction('experience_set',buildSlider('wbLife','Not at all','Deeply satisfied','submitWbLife'));
}

/* ── STEP 5-6: WELL-BEING ── */
function buildSlider(id,lo,hi,fnName){
  return '<div class="slider-wrap"><div class="slider-row"><input type="range" id="'+id+'" min="1" max="10" value="5" oninput="document.getElementById(\''+id+'Val\').textContent=this.value"/><span class="slider-val" id="'+id+'Val">5</span></div><div class="slider-labels"><span>'+lo+'</span><span>'+hi+'</span></div></div><button class="action-btn" onclick="'+fnName+'()">Submit \u2192</button>';
}
function submitWbLife(){
  wellbeing.life=parseInt(document.getElementById('wbLife').value);
  lockAll();addUserBubble('Life satisfaction: '+wellbeing.life+'/10');
  STEP=6;
  getAIReaction('wb_life',buildSlider('wbEnergy','Running on empty','Fully charged','submitWbEnergy'));
}
function submitWbEnergy(){
  wellbeing.energy=parseInt(document.getElementById('wbEnergy').value);
  lockAll();addUserBubble('Energy & motivation: '+wellbeing.energy+'/10');
  STEP=7;
  // AI reacts to energy score (no extra UI — summary comes next)
  getAIReaction('wb_energy',null,function(){
    setTimeout(buildSummary,1200);
  });
}

/* ── STEP 7: SUMMARY ── */
function buildSummary(){
  var avg=((wellbeing.life+wellbeing.energy)/2).toFixed(1);
  var wbColor=avg<=3.5?'#ef4444':avg<=5.5?'var(--gd)':avg<=7.5?'var(--cy)':'var(--gn)';
  var wbPct=Math.round((avg/10)*100);
  var wbLabel=avg<=3.5?'Needs attention':avg<=5.5?'Room to grow':avg<=7.5?'On a good track':'Thriving';

  var badges=['primary','secondary','tertiary'];
  var badgeLabels=['Primary','Secondary','Tertiary'];
  var card='<div class="summary-card">';
  ranked.forEach(function(id,i){
    var g=goalObj(id);var subs=subSelected[id]&&subSelected[id].length?subSelected[id].join(', '):'';
    card+='<div class="sum-row"><span class="sum-icon">'+g.icon+'</span><div style="flex:1"><div class="sum-label">'+g.label+'</div>'+(subs?'<div class="sum-subs">'+esc(subs)+'</div>':'')+'</div><span class="sum-badge '+badges[i]+'">'+badgeLabels[i]+'</span></div>';
  });
  card+='</div>';

  var meter='<div class="wb-meter"><div class="wb-title">Your Well-Being Baseline</div><div class="wb-bar-wrap"><div class="wb-bar-fill" id="wbBarFill" style="width:0%;background:'+wbColor+'"></div></div><div class="wb-row"><span class="wb-label">'+wbLabel+'</span><span class="wb-value" style="color:'+wbColor+'">'+avg+'/10</span></div></div>';

  var prefs='<div class="pref-summary">';
  if(budgetPref)prefs+='<span class="pref-tag">'+(budgetPref==='premium'?'\uD83C\uDFAF Premium':budgetPref==='value'?'\uD83D\uDCB0 Best value':'\u2696\uFE0F Mixed')+'</span>';
  if(expLevel)prefs+='<span class="pref-tag">'+(expLevel==='new'?'\uD83C\uDD95 New to HSA':expLevel==='some'?'\uD83D\uDC4D Some experience':'\uD83C\uDFC6 Experienced')+'</span>';
  if(bal>0)prefs+='<span class="pref-tag">\uD83D\uDCB3 $'+bal.toLocaleString()+' '+acct+'</span>';
  if(hasIns)prefs+='<span class="pref-tag">\uD83D\uDEE1\uFE0F Insurance verified</span>';
  prefs+='</div>';

  var structuredUI=card+meter+prefs;

  // AI generates the narrative summary, frontend appends the structured card
  getAIReaction('summary',structuredUI,function(){
    setTimeout(function(){var bar=document.getElementById('wbBarFill');if(bar)bar.style.width=wbPct+'%'},200);
    document.getElementById('bottomCta').classList.add('show');
    try{
      sessionStorage.setItem('beim_goals',JSON.stringify(ranked));
      sessionStorage.setItem('beim_goal_subs',JSON.stringify(subSelected));
      sessionStorage.setItem('beim_wellbeing',JSON.stringify(wellbeing));
      sessionStorage.setItem('beim_budget_pref',budgetPref);
      sessionStorage.setItem('beim_exp_level',expLevel);
    }catch(e){}
  });
}

/* ── FREE TEXT ── */
function sendFreeText(){
  var input=document.getElementById('chatInput'),text=input.value.trim();
  if(!text)return;input.value='';
  addUserBubble(text);showTyping();
  var ctx={page:'goals',balance:bal,acctType:acct,goals:ranked.length?ranked.map(goalLabel):selected.map(goalLabel),goalIds:ranked.length?ranked:selected,step:STEP,wellbeing:wellbeing,subGoals:subSelected,budgetPref:budgetPref,expLevel:expLevel,hasInsurance:hasIns};
  if(firstName)ctx.firstName=firstName;if(employer)ctx.employer=employer;
  fetch(W+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:chatHistory.slice(-8),navigator:nav,context:ctx})})
  .then(function(r){return r.json()}).then(function(d){
    removeTyping();
    var reply=d.reply||'Good question! Keep going with the steps above \u2014 I\u2019m tracking everything.';
    if(STEP<7){
      var nudge='';
      if(STEP===1)nudge=' Go ahead and pick your top 3 goals above when you\u2019re ready.';
      else if(STEP===2)nudge=' Tag your specifics above whenever you\u2019re ready.';
      else if(STEP===3)nudge=' Set your rankings above and lock them in.';
      else if(STEP>=4&&STEP<5)nudge=' Answer the question above to continue.';
      else if(STEP>=5)nudge=' Use the slider above to answer.';
      reply+=nudge;
    }
    addNavBubble(reply);
  }).catch(function(){removeTyping();addNavBubble('I hit a snag \u2014 try again in a moment. The steps above still work.')});
}

/* ── NAVIGATION ── */
function goToProducts(){
  pushToZoho();
  var params=new URLSearchParams();
  if(bal>0)params.set('balance',bal.toFixed(2));if(acct)params.set('acct',acct);if(nav)params.set('nav',nav);
  if(firstName)params.set('first_name',encodeURIComponent(firstName));
  if(lastName)params.set('last_name',encodeURIComponent(lastName));
  if(email)params.set('email',encodeURIComponent(email));
  if(employer)params.set('employer',encodeURIComponent(employer));
  if(ranked.length)params.set('goals',ranked.join(','));
  if(hasIns)params.set('benefits','verified');
  params.set('wb_life',wellbeing.life);params.set('wb_energy',wellbeing.energy);
  if(budgetPref)params.set('budget',budgetPref);
  if(expLevel)params.set('exp',expLevel);
  location.href='products.html?'+params.toString();
}

function pushToZoho(){
  var lid=sGet('beim_lead_id')||null;
  if(!email&&!lid)return;
  var tx=chatLog.map(function(e){var d=new Date(e.t);return'['+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})+'] '+(e.r==='user'?'User':'Navigator')+': '+e.m}).join('\n');
  var allSubs=[];ranked.forEach(function(id){if(subSelected[id])subSelected[id].forEach(function(s){allSubs.push(s)})});
  var avg=((wellbeing.life+wellbeing.energy)/2).toFixed(1);
  var payload={
    first_name:firstName,last_name:lastName,employer:employer,navigator:nav,
    source:'goals_page',page:'goals',acct_type:acct,balance:bal,chat_transcript:tx,
    health_goal_1:ranked[0]?goalLabel(ranked[0]):null,
    health_goal_2:ranked[1]?goalLabel(ranked[1]):null,
    health_goal_3:ranked[2]?goalLabel(ranked[2]):null,
    health_sub_goals:allSubs.length?allSubs.join(', '):null,
    goals_completed:STEP>=7,
    wellbeing_life:wellbeing.life,
    wellbeing_energy:wellbeing.energy,
    wellbeing_avg:parseFloat(avg)
  };
  if(email)payload.email=email;if(lid)payload.lead_id=lid;
  try{fetch(W+'/api/beim-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.json()}).then(function(d){if(d.lead_id)try{sessionStorage.setItem('beim_lead_id',d.lead_id)}catch(e){}}).catch(function(){})}catch(e){}
}
</script>
