<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Health Goals — Beim Health</title>
<meta name="description" content="A 2-minute guided conversation that matches you to the right HSA/FSA-eligible products. No forms — just honest questions from your Care Navigator."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060610;--card:rgba(16,16,32,.65);--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.14);--cy:#6ee0f5;--pu:#7c6af0;--bl:#6aa3f3;--gn:#3dd9b6;--gd:#f59e0b;--rd:#ef4444;--tx:#f0f0ff;--mu:#8a8da8;--dm:#5a5d78;--radius:20px;--radius-s:14px;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column}
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:160%;height:160%;top:-30%;left:-30%;background:radial-gradient(ellipse 700px 600px at 20% 15%,rgba(124,106,240,.06),transparent 70%),radial-gradient(ellipse 500px 400px at 80% 70%,rgba(110,224,245,.04),transparent 70%);animation:meshDrift 35s ease-in-out infinite alternate}
@keyframes meshDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,-15px) scale(1.02)}}
.noise{position:fixed;inset:0;z-index:0;opacity:.014;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px 128px}
.chat-app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto;width:100%}
.chat-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;backdrop-filter:blur(20px);background:rgba(6,6,16,.85)}
.ch-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--mu);text-decoration:none;font-size:14px;transition:all .2s;flex-shrink:0}
.ch-back:hover{border-color:var(--border-h);color:var(--tx)}
.ch-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0}
.ch-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ch-avatar-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--gn);border:2px solid rgba(6,6,16,.9)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;color:#fff}
.ch-status{font-size:11px;color:var(--gn);font-weight:600}
.step-indicator{display:flex;align-items:center;gap:6px}
.step-dot{width:28px;height:4px;border-radius:4px;background:rgba(255,255,255,.06);transition:all .4s var(--ease)}
.step-dot.done{background:var(--gn)}
.step-dot.active{background:linear-gradient(90deg,var(--cy),var(--pu));width:40px;box-shadow:0 0 12px rgba(110,224,245,.15)}
.messages{flex:1;overflow-y:auto;padding:20px 24px 100px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
.msg{display:flex;gap:10px;animation:msgIn .4s var(--ease) both;max-width:100%}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-avatar.you{background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--mu);font-weight:600}
.bubble{font-size:14px;line-height:1.7;padding:12px 16px;border-radius:18px;max-width:92%;position:relative}
.bubble.nav{color:rgba(240,240,255,.85);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.bubble.nav.ev{background:rgba(110,224,245,.04);border-color:rgba(110,224,245,.1)}
.bubble.nav.br{background:rgba(124,106,240,.04);border-color:rgba(124,106,240,.1)}
.bubble.usr{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.75)}
.typing-dots{display:flex;gap:4px;padding:12px 16px;border-radius:18px;align-items:center}
.typing-dots.ev{background:rgba(110,224,245,.04);border:1px solid rgba(110,224,245,.1)}
.typing-dots.br{background:rgba(124,106,240,.04);border:1px solid rgba(124,106,240,.1)}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:rgba(240,240,255,.25);animation:dotPulse 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotPulse{0%,60%,100%{opacity:.25;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}

/* ── Choice Buttons (replaces goal chips) ── */
.choice-group{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.choice-btn{font-size:13px;font-weight:600;padding:12px 18px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.75);cursor:pointer;transition:all .25s var(--ease);user-select:none;text-align:left;display:flex;align-items:center;gap:10px}
.choice-btn:hover{border-color:rgba(124,106,240,.4);background:rgba(124,106,240,.06);color:#fff;transform:translateX(4px)}
.choice-btn.selected{border-color:rgba(124,106,240,.5);background:rgba(124,106,240,.12);color:#fff;box-shadow:0 0 14px rgba(124,106,240,.1)}
.choice-btn.locked{pointer-events:none;opacity:.7}
.choice-btn .cb-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.choice-btn .cb-label{flex:1}
.choice-btn .cb-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
.choice-btn.selected .cb-check{border-color:var(--pu);background:var(--pu);color:#fff}
.choice-hint{font-size:11px;color:var(--dm);margin-top:4px;font-weight:500}
.choice-confirm{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:11px 22px;border-radius:100px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .25s var(--ease)}
.choice-confirm:hover{box-shadow:0 6px 28px rgba(124,106,240,.3);transform:translateY(-1px)}
.choice-confirm:disabled{opacity:.3;pointer-events:none}
.choice-confirm.locked{pointer-events:none;opacity:.35}

/* ── Rank Items ── */
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);margin-bottom:6px;transition:all .2s}
.rank-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.rank-num.r1{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--gd)}
.rank-num.r2{background:rgba(124,106,240,.1);border:1px solid rgba(124,106,240,.25);color:var(--pu)}
.rank-num.r3{background:rgba(110,224,245,.08);border:1px solid rgba(110,224,245,.2);color:var(--cy)}
.rank-label{font-size:13px;font-weight:600;color:#fff;flex:1}
.rank-icon{font-size:15px;flex-shrink:0}
.rank-arrows{display:flex;flex-direction:column;gap:2px}
.rank-arrow{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--mu);width:24px;height:20px;border-radius:6px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:all .15s}
.rank-arrow:hover{border-color:rgba(255,255,255,.2);color:var(--tx);background:rgba(255,255,255,.08)}
.rank-arrow.disabled{opacity:.15;pointer-events:none}

/* ── Pref Buttons ── */
.pref-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pref-btn{font-size:12px;font-weight:600;padding:10px 18px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.7);cursor:pointer;transition:all .25s var(--ease);text-align:center;flex:1;min-width:120px}
.pref-btn:hover{border-color:rgba(124,106,240,.3);background:rgba(124,106,240,.04);color:#fff}
.pref-btn.selected{border-color:rgba(124,106,240,.5);background:rgba(124,106,240,.1);color:#fff}
.pref-btn.locked{pointer-events:none;opacity:.8}

/* ── Value Reveal Card ── */
.value-card{background:linear-gradient(135deg,rgba(61,217,182,.06),rgba(110,224,245,.04));border:1px solid rgba(61,217,182,.15);border-radius:16px;padding:16px;margin-top:10px}
.vc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.vc-badge{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;background:rgba(61,217,182,.12);color:var(--gn);padding:4px 10px;border-radius:100px}
.vc-count{font-size:22px;font-weight:800;color:#fff;font-family:'DM Mono',monospace}
.vc-label{font-size:13px;color:var(--mu);line-height:1.5;margin-top:4px}
.vc-items{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.vc-item{font-size:11px;font-weight:600;padding:6px 12px;border-radius:100px;background:rgba(61,217,182,.06);border:1px solid rgba(61,217,182,.12);color:var(--gn)}

/* ── Summary ── */
.summary-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin-top:12px}
.sum-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sum-row:last-child{border-bottom:none}
.sum-icon{font-size:18px;flex-shrink:0}
.sum-label{font-size:13px;font-weight:600;color:#fff;flex:1}
.sum-subs{font-size:11px;color:var(--mu);margin-top:2px}
.sum-badge{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:100px;flex-shrink:0}
.sum-badge.primary{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gd)}
.sum-badge.secondary{background:rgba(124,106,240,.08);border:1px solid rgba(124,106,240,.2);color:var(--pu)}
.sum-badge.tertiary{background:rgba(110,224,245,.06);border:1px solid rgba(110,224,245,.15);color:var(--cy)}
.sum-stat{display:flex;align-items:center;gap:10px;padding:8px 0}
.sum-stat-val{font-size:20px;font-weight:800;font-family:'DM Mono',monospace}
.sum-stat-label{font-size:12px;color:var(--mu)}
.pref-summary{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pref-tag{font-size:11px;font-weight:600;padding:5px 12px;border-radius:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--mu)}

/* ── Bottom CTA ── */
.bottom-cta{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:16px 24px;background:linear-gradient(to top,rgba(6,6,16,.98) 60%,transparent);display:none}
.bottom-cta.show{display:block}
.bottom-cta-btn{display:block;width:100%;max-width:680px;margin:0 auto;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .3s var(--ease);letter-spacing:.3px}
.bottom-cta-btn:hover{box-shadow:0 8px 40px rgba(124,106,240,.4);transform:translateY(-2px)}

/* ── Input bar ── */
.input-bar{display:flex;gap:8px;padding:10px 24px;border-top:1px solid rgba(255,255,255,.06);background:rgba(6,6,16,.9);backdrop-filter:blur(20px);flex-shrink:0}
.input-field{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 16px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.input-field:focus{border-color:rgba(124,106,240,.3)}
.input-field::placeholder{color:var(--dm)}
.send-btn{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--pu),var(--bl));border:none;color:#fff;font-size:16px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:hover{box-shadow:0 4px 20px rgba(124,106,240,.3)}

@media(max-width:600px){
  .chat-header{padding:12px 16px}
  .messages{padding:16px 16px 100px}
  .input-bar{padding:4px 4px}
  .bubble{font-size:13px;padding:10px 14px;max-width:95%}
}
</style>
</head>
<body>
<div class="bg-mesh"></div><div class="noise"></div>

<div class="chat-app">
  <div class="chat-header">
    <a class="ch-back" href="insurance.html" title="Back">&larr;</a>
    <div class="ch-avatar" id="headerAvatar"></div>
    <div class="ch-info">
      <div class="ch-name" id="headerName">Care Navigator</div>

    </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════════
   BEIM HEALTH — Goals Conversation (Voiceflow Interact API)
   ══════════════════════════════════════════════════════════════
   Architecture:
   - Frontend handles UI rendering (chat bubbles, choice buttons)
   - Voiceflow handles conversation state + AI responses
   - Falls back to local logic if Voiceflow is unavailable
   
   Voiceflow Interact API contract:
   POST https://general-runtime.voiceflow.com/state/user/{userId}/interact
   Headers: { Authorization: VOICEFLOW_API_KEY, versionID: 'production' }
   Body: { action: { type: 'text'|'intent', payload: '...' } }
   
   Until Voiceflow flows are built, this runs in LOCAL MODE
   using the same question structure and deterministic logic.
   The swap point is clearly marked — search for "VOICEFLOW_SWAP"
   ══════════════════════════════════════════════════════════════ */

var WORKER_URL = 'https://beim-health-analyzer.steven-03f.workers.dev';
var AVATARS = {
  everly: 'https://cdn.prod.website-files.com/68a9f0181d51caed859528b5/69adc9cb864a991d937219da_Gemini_Generated_Image_uuevmuuevmuuevmu%20(1)%20-%20Edited.png',
  brooks: 'https://cdn.prod.website-files.com/68a9f0181d51caed859528b5/69aee445c428d6a66c5ca3c3_Gemini_Generated_Image_utzzfnutzzfnutzz%20-%20Edited.png'
};

/* ── VOICEFLOW CONFIG ── */
// TODO: Replace with your Voiceflow project API key
var VF_API_KEY = ''; // e.g. 'VF.DM.xxxxxxx.yyyyy'
var VF_VERSION = 'production';
var VF_BASE = 'https://general-runtime.voiceflow.com';
var USE_VOICEFLOW = false; // flip to true once flows are built

/* ══════════════════════════════════════════
   THE 5 STICKY QUESTIONS
   Reverse-engineered from 187 products / 152 conditions
   Each answer activates specific goal_tags + conditions
   ══════════════════════════════════════════ */
var QUESTIONS = {
  q1_energy: {
    step: 'q1_energy',
    prompt: '<strong>How\u2019s your energy day to day?</strong> Pick whichever sounds most like you.',
    selectType: 'single',
    options: [
      { id: 'crash',   icon: '\u26A0\uFE0F', label: 'I crash by 2\u20133pm most days',       tags: ['Labs & Biomarkers','Energy & Focus','Sleep Quality'], conditions: ['Cortisol Imbalance','Adrenal Dysfunction','Thyroid Disorders','Fatigue'] },
      { id: 'caffeine',icon: '\u2615',       label: 'Decent, but I rely on caffeine',       tags: ['Energy & Focus','General Wellness'], conditions: ['Fatigue','Vitamin Deficiency'] },
      { id: 'steady',  icon: '\u2705',       label: 'Pretty steady \u2014 no complaints',   tags: [], conditions: [] },
      { id: 'fatigue', icon: '\uD83D\uDEA8', label: 'I\u2019m actively struggling with fatigue', tags: ['Labs & Biomarkers','Energy & Focus','Sleep Quality'], conditions: ['Fatigue','Cortisol Imbalance','Sleep Disorders','Thyroid Disorders'] },
    ]
  },
  q2_body: {
    step: 'q2_body',
    prompt: '<strong>What about your body</strong> \u2014 any of these resonate? Pick all that apply.',
    selectType: 'multi',
    options: [
      { id: 'weight',   icon: '\u2696\uFE0F', label: 'I want to lose weight and haven\u2019t found what works', tags: ['Weight Management'], conditions: ['Obesity','Weight Management','Type 2 Diabetes'] },
      { id: 'bloodsugar',icon:'\uD83E\uDE78', label: 'My doctor mentioned blood sugar or cholesterol',      tags: ['Labs & Biomarkers','Heart & Cardiovascular'], conditions: ['Hyperlipidemia','Hypertension','Diabetes','Metabolic Syndrome'] },
      { id: 'hormonal', icon: '\uD83D\uDD04', label: 'I\u2019ve noticed changes I think might be hormonal',  tags: ['Labs & Biomarkers','Hormones & Fertility'], conditions: ['Hormone Imbalance','Menopause','Hypogonadism','Thyroid Disorders'] },
      { id: 'injury',   icon: '\uD83E\uDE79', label: 'Recovering from an injury or surgery',                 tags: ['Recovery & Performance'], conditions: ['Muscle Pain','Soft Tissue Injury','Recovery'] },
    ]
  },
  q3_appearance: {
    step: 'q3_appearance',
    prompt: '<strong>Anything cosmetic or appearance-related</strong> you\u2019ve been thinking about?',
    selectType: 'single',
    options: [
      { id: 'hair', icon: '\uD83D\uDC87', label: 'Hair thinning or loss',                         tags: ['Hair & Hair Loss'], conditions: ['Alopecia','Hair Loss','Female Pattern Hair Loss'] },
      { id: 'skin', icon: '\u2728',       label: 'Skin concerns \u2014 acne, aging, redness',      tags: ['Skin & Anti-Aging'], conditions: ['Acne Vulgaris','Rosacea','Photoaging'] },
      { id: 'both', icon: '\uD83D\uDC86', label: 'Both hair and skin',                             tags: ['Hair & Hair Loss','Skin & Anti-Aging'], conditions: ['Alopecia','Hair Loss','Acne Vulgaris','Photoaging'] },
      { id: 'none', icon: '\uD83D\uDC4D', label: 'Not really',                                     tags: [], conditions: [] },
    ]
  },
  q4_mental: {
    step: 'q4_mental',
    prompt: '<strong>How are you doing mentally right now?</strong> No judgment \u2014 this affects which products and screenings make sense.',
    selectType: 'single',
    options: [
      { id: 'anxiety', icon: '\uD83D\uDE1F', label: 'Dealing with real anxiety or depression',  tags: ['Labs & Biomarkers'], conditions: ['Anxiety','Depression','Neurotransmitter Imbalance'] },
      { id: 'stress',  icon: '\uD83D\uDE2E\u200D\uD83D\uDCA8', label: 'Stressed and burnt out, but managing', tags: ['Labs & Biomarkers'], conditions: ['Stress','Cortisol Imbalance','Adrenal Dysfunction'] },
      { id: 'sleep',   icon: '\uD83D\uDE34', label: 'Sleep is the main issue',                  tags: ['Sleep Quality'], conditions: ['Sleep Disorders','Insomnia'] },
      { id: 'good',    icon: '\uD83D\uDE0A', label: 'Actually doing well',                      tags: [], conditions: [] },
    ]
  },
  q5_other: {
    step: 'q5_other',
    prompt: '<strong>Last one</strong> \u2014 anything I haven\u2019t asked about? Heart health, gut issues, immunity, fertility \u2014 anything on your radar?',
    selectType: 'multi',
    options: [
      { id: 'heart',     icon: '\u2764\uFE0F', label: 'Heart / blood pressure / cholesterol',  tags: ['Heart & Cardiovascular'], conditions: ['Hypertension','Cardiovascular Disease','Hyperlipidemia'] },
      { id: 'gut',       icon: '\uD83E\uDDA0', label: 'Gut / digestion',                        tags: ['Gut & Digestion'], conditions: ['IBS','Digestive Issues'] },
      { id: 'immunity',  icon: '\uD83D\uDEE1\uFE0F', label: 'Immunity / cancer screening',     tags: ['Immunity & Prevention'], conditions: ['Cancer Screening','Vitamin Deficiency'] },
      { id: 'fertility', icon: '\uD83C\uDF31', label: 'Fertility or sexual health',             tags: ['Hormones & Fertility'], conditions: ['Hypogonadism','Low Testosterone'] },
    ]
  }
};

var QUESTION_ORDER = ['q1_energy', 'q2_body', 'q3_appearance', 'q4_mental', 'q5_other'];

/* ── Navigator reactions for each question (LOCAL MODE) ── */
var REACTIONS = {
  q1_energy: function(answers) {
    if (answers.includes('fatigue') || answers.includes('crash')) {
      return 'That tells me a lot. Low energy usually has a root cause \u2014 cortisol, thyroid, sleep quality, or all three. I\u2019m flagging labs and screening panels that can pin it down' + (bal > 200 ? ', and your ' + acct + ' covers every one of them.' : '.');

/* ══════════════════════════════════════════
   VOICEFLOW INTERACT API (VOICEFLOW_SWAP)
   
   When Voiceflow flows are built:
   1. Set VF_API_KEY to your project key
   2. Set USE_VOICEFLOW = true
   3. The interact() function sends user input to Voiceflow
      and returns the response traces (text, buttons, etc.)
   4. Navigator reactions come from Voiceflow instead of
      the local REACTIONS object
   ══════════════════════════════════════════ */
async function vfInteract(payload) {
  if (!USE_VOICEFLOW || !VF_API_KEY) return null;
  try {
    var res = await fetch(VF_BASE + '/state/user/' + vfUserId + '/interact', {
      method: 'POST',
      headers: {
        'Authorization': VF_API_KEY,
        'Content-Type': 'application/json',
        'versionID': VF_VERSION
      },
      body: JSON.stringify({ action: payload })
    });
    if (!res.ok) return null;
    var traces = await res.json();
    // Extract text traces for navigator bubbles
    var texts = [];
    for (var i = 0; i < traces.length; i++) {
      if (traces[i].type === 'text') {
        texts.push(traces[i].payload.message);
      }
    }
    return texts.length > 0 ? texts.join('<br><br>') : null;
  } catch (e) {
    console.warn('Voiceflow unavailable, using local fallback', e);
    return null;
  }
}

async function vfLaunch() {
  if (!USE_VOICEFLOW || !VF_API_KEY) return;
  // Launch the Voiceflow conversation with user context
  try {
    await fetch(VF_BASE + '/state/user/' + vfUserId + '/interact', {
      method: 'POST',
      headers: { 'Authorization': VF_API_KEY, 'Content-Type': 'application/json', 'versionID': VF_VERSION },
      body: JSON.stringify({
        action: { type: 'launch' },
        // Pass user context as launch variables
        state: {
          variables: {
            first_name: firstName,
            balance: bal,
            acct_type: acct,
            age: age,
            has_insurance: hasIns,
            navigator: nav,
            employer: employer,
            deadline: deadline
          }
        }
      })
    });
  } catch (e) { console.warn('VF launch failed', e); }
}

/* ── Get AI reaction (Voiceflow or local) ── */
async function getReaction(questionId, userAnswers, callback) {
  showTyping();

  // Try Voiceflow first
  var vfReply = await vfInteract({
    type: 'text',
    payload: JSON.stringify({ step: questionId, answers: userAnswers, balance: bal, acctType: acct, age: age })
  });

  removeTyping();

  if (vfReply) {
    return vfReply;
  }

  // Local fallback
  var fn = REACTIONS[questionId];
  if (fn) return fn(userAnswers);
  return 'Got it. Let\u2019s keep going.';
}

  dots.forEach(function(d, i) {

function buildChoiceUI(questionId) {
  var q = QUESTIONS[questionId];
  if (!q) return '';
  var isMulti = q.selectType === 'multi';
  var html = '<div class="choice-group" data-qid="' + questionId + '">';
  q.options.forEach(function(opt) {
    html += '<div class="choice-btn" data-oid="' + opt.id + '" onclick="pickChoice(this,\'' + questionId + '\',\'' + opt.id + '\',' + isMulti + ')">';
    html += '<span class="cb-icon">' + opt.icon + '</span>';
    html += '<span class="cb-label">' + opt.label + '</span>';
    html += '<span class="cb-check"></span>';
    html += '</div>';
  });
  if (isMulti) {
    html += '<div class="choice-hint">Select all that apply, or skip if none</div>';
    html += '<button class="choice-confirm" onclick="confirmChoice(\'' + questionId + '\')">Continue \u2192</button>';
  }
  html += '</div>';
  return html;
}

function pickChoice(el, questionId, optionId, isMulti) {
  if (el.classList.contains('locked')) return;
  var q = QUESTIONS[questionId];
  if (!answers[questionId]) answers[questionId] = [];

  if (isMulti) {
    var idx = answers[questionId].indexOf(optionId);
    if (idx > -1) { answers[questionId].splice(idx, 1); el.classList.remove('selected'); }
    else { answers[questionId].push(optionId); el.classList.add('selected'); }
  } else {
    // Single select — pick and go
    answers[questionId] = [optionId];
    el.classList.add('selected');
    lockAllChoices();
    // Show user's answer
    var opt = q.options.find(function(o) { return o.id === optionId });
    addUserBubble(opt ? opt.icon + ' ' + opt.label : optionId);
    // Process
    processAnswer(questionId);
  }
}

function confirmChoice(questionId) {
  var q = QUESTIONS[questionId];
  if (!answers[questionId]) answers[questionId] = [];
  lockAllChoices();
  // Show what they picked
  if (answers[questionId].length === 0) {
    addUserBubble('None of these \u2014 skipping');
  } else {
    var labels = answers[questionId].map(function(id) {
      var opt = q.options.find(function(o) { return o.id === id });
      return opt ? opt.icon + ' ' + opt.label : id;
    });
    addUserBubble(labels.join(', '));
  }
  processAnswer(questionId);
}

function processAnswer(questionId) {
  var q = QUESTIONS[questionId];
  var userAnswers = answers[questionId] || [];

  // Accumulate activated tags and conditions
  userAnswers.forEach(function(answerId) {
    var opt = q.options.find(function(o) { return o.id === answerId });
    if (opt) {
      opt.tags.forEach(function(t) { if (activatedTags.indexOf(t) === -1) activatedTags.push(t) });
      opt.conditions.forEach(function(c) { if (activatedConditions.indexOf(c) === -1) activatedConditions.push(c) });
    }
  });

  // Get reaction then advance
  showTyping();
  setTimeout(async function() {
    var reply = await getReaction(questionId, userAnswers);
    removeTyping();

    var qIdx = QUESTION_ORDER.indexOf(questionId);
    var nextQ = QUESTION_ORDER[qIdx + 1];

    if (nextQ) {
      // Show reaction + next question
      var nextUI = buildChoiceUI(nextQ);
      addNavBubble(reply);
      showTyping();
      setTimeout(function() {
        removeTyping();
        addNavBubble(QUESTIONS[nextQ].prompt, nextUI);
        STEP = qIdx + 2;
      }, 900 + Math.random() * 400);
    } else {
      // All 5 questions done — move to priority ranking
      addNavBubble(reply);
      STEP = 6;
      setTimeout(function() { showPriorityRank() }, 1000);
    }
  }, 600 + Math.random() * 500);
}

function buildRanker() {

function renderRankItems() {
  var cls = ['r1','r2','r3','r2','r3'];
  var html = '';
  ranked.forEach(function(tag, i) {
    var m = GOAL_META[tag] || { icon: '\uD83D\uDCCB', short: tag };
    html += '<div class="rank-item"><div class="rank-num ' + (cls[i] || 'r3') + '">' + (i + 1) + '</div>';

    html += '<span class="rank-label">' + m.short + '</span>';
    html += '<div class="rank-arrows">';
    html += '<button class="rank-arrow' + (i === 0 ? ' disabled' : '') + '" onclick="moveRank(' + i + ',-1)">\u25B2</button>';
    html += '<button class="rank-arrow' + (i === ranked.length - 1 ? ' disabled' : '') + '" onclick="moveRank(' + i + ',1)">\u25BC</button>';
    html += '</div></div>';
  });
  return html;
}

function moveRank(i, d) {
  var n = i + d; if (n < 0 || n >= ranked.length) return;
  var t = ranked[i]; ranked[i] = ranked[n]; ranked[n] = t;
  var wrap = document.getElementById('rankContainer'); if (wrap) wrap.innerHTML = renderRankItems();

function confirmRank() {

function buildSummary() {

  // This would come from Voiceflow in production
  matchedCount = 0;
  var tagCounts = { 'Labs & Biomarkers': 88, 'Weight Management': 39, 'General Wellness': 14,

    'Immunity & Prevention': 7, 'Energy & Focus': 6, 'Sleep Quality': 3,
    'Recovery & Performance': 3, 'Gut & Digestion': 2, 'Fitness & Energy': 2,
    'Hormones & Fertility': 1, 'Brain Health': 1 };
  var seenTags = {};
  activatedTags.forEach(function(t) {
    if (!seenTags[t]) { matchedCount += (tagCounts[t] || 0); seenTags[t] = true; }
  });
  // Rough dedup (many products share tags)
  matchedCount = Math.min(matchedCount, 140);
  if (matchedCount > 80) matchedCount = Math.round(matchedCount * 0.6);

  // Navigator narrative

  var badgeLabels = ['Primary','Secondary','Tertiary'];
  top3.forEach(function(tag, i) {
    var m = GOAL_META[tag] || { icon: '\uD83D\uDCCB', short: tag };
    card += '<div class="sum-row"><span class="sum-icon">' + m.icon + '</span>';
    card += '<div style="flex:1"><div class="sum-label">' + m.short + '</div></div>';
    card += '<span class="sum-badge ' + badges[i] + '">' + badgeLabels[i] + '</span></div>';
  });
  card += '<div class="sum-stat"><span class="sum-stat-val" style="color:var(--gn)">' + matchedCount + '</span><span class="sum-stat-label">products matched</span></div>';
  if (bal > 0) {

  }

  if (budgetPref) prefs += '<span class="pref-tag">' + (budgetPref === 'premium' ? '\uD83C\uDFAF Premium' : budgetPref === 'value' ? '\uD83D\uDCB0 Best value' : '\u2696\uFE0F Mixed') + '</span>';

  sSet('beim_activated_conditions', JSON.stringify(activatedConditions));
  sSet('beim_answers', JSON.stringify(answers));
  sSet('beim_budget_pref', budgetPref);
  sSet('beim_exp_level', expLevel);
  sSet('beim_matched_count', matchedCount);
}

/* ══════════════════════════════════════════
   FREE TEXT
   ══════════════════════════════════════════ */
function sendFreeText() {
  var input = document.getElementById('chatInput'), text = input.value.trim();
  if (!text) return; input.value = '';
  addUserBubble(text); showTyping();

  /* ── VOICEFLOW_SWAP: Free text goes to Voiceflow interact ── */
  if (USE_VOICEFLOW && VF_API_KEY) {
    vfInteract({ type: 'text', payload: text }).then(function(reply) {
      removeTyping();
      addNavBubble(reply || 'Good question! Keep going with the steps above \u2014 I\u2019m tracking everything.');
    });
    return;
  }

  /* ── LOCAL FALLBACK: Send to Gemini chat (existing worker) ── */
  var ctx = {
    page: 'goals', balance: bal, acctType: acct, firstName: firstName,
    goals: ranked.length ? ranked : activatedTags,
    step: STEP, budgetPref: budgetPref, expLevel: expLevel,
    hasInsurance: hasIns
  };
  if (employer) ctx.employer = employer;

  fetch(WORKER_URL + '/api/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, history: chatHistory.slice(-8), navigator: nav, context: ctx })
  })
  .then(function(r) { return r.json() })
  .then(function(d) {
    removeTyping();
    var reply = d.reply || 'Good question! Keep going with the steps above.';
    addNavBubble(reply);
  })
  .catch(function() { removeTyping(); addNavBubble('I hit a snag \u2014 try again in a moment.') });
}

/* ══════════════════════════════════════════
   INIT + CONVERSATION START
   ══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function() {
  var p = new URLSearchParams(location.search);
  nav = p.get('nav') || sGet('beim_nav') || 'brooks';
  if (nav === 'skip') nav = 'brooks';
  navName = nav === 'everly' ? 'Everly' : 'Brooks';
  navCls = nav === 'everly' ? 'ev' : 'br';
  firstName = p.get('first_name') ? decodeURIComponent(p.get('first_name')) : (sGet('beim_first_name') || '');
  lastName = p.get('last_name') ? decodeURIComponent(p.get('last_name')) : (sGet('beim_last_name') || '');
  employer = p.get('employer') ? decodeURIComponent(p.get('employer')) : (sGet('beim_employer') || '');
  email = p.get('email') ? decodeURIComponent(p.get('email')) : (sGet('beim_email') || '');
  bal = parseFloat(p.get('balance')) || 0;
  acct = p.get('acct') || 'HSA';
  deadline = p.get('deadline') || sGet('beim_fsa_deadline') || '';
  hasIns = p.get('benefits') === 'verified';
  age = parseInt(p.get('age')) || 0;

  // Voiceflow user ID = lead_id or generated
  vfUserId = sGet('beim_lead_id') || ('beim_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));

  var img = AVATARS[nav] || AVATARS.brooks;
  document.getElementById('headerAvatar').innerHTML = '<img src="' + img + '"/><span class="ch-avatar-dot"></span>';
  document.getElementById('headerName').textContent = navName;

  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); sendFreeText() }
  });

  // Launch Voiceflow session if enabled
  if (USE_VOICEFLOW) vfLaunch();

  setTimeout(startConversation, 500);
});

function startConversation() {
  STEP = 1;
  // Continuation tone — they already chose their navigator, entered balance, checked insurance
  var greeting = 'Alright' + (firstName ? ', ' + esc(firstName) : '') + ' \u2014 let\u2019s figure out what matters most to you.';
  if (bal > 0) greeting += ' You\u2019ve got <strong>$' + bal.toLocaleString() + ' ' + acct + '</strong> to work with.';
  if (hasIns) greeting += ' Insurance is verified \u2014 I\u2019ll use it first.';
  greeting += ' I\u2019ve got 5 quick questions \u2014 about 2 minutes.';
  addNavBubble(greeting);

  // Start with Q1 after a beat
  showTyping();
  setTimeout(function() {
    removeTyping();
    var q1 = QUESTIONS.q1_energy;
    addNavBubble(q1.prompt, buildChoiceUI('q1_energy'));
  }, 1400);
}

/* ══════════════════════════════════════════
   NAVIGATION + ZOHO PUSH
   ══════════════════════════════════════════ */
function goToProducts() {
  pushToZoho();
  var params = new URLSearchParams();
  if (bal > 0) params.set('balance', bal.toFixed(2));
  if (acct) params.set('acct', acct);
  if (nav) params.set('nav', nav);
  if (firstName) params.set('first_name', encodeURIComponent(firstName));
  if (lastName) params.set('last_name', encodeURIComponent(lastName));
  if (email) params.set('email', encodeURIComponent(email));
  if (employer) params.set('employer', encodeURIComponent(employer));
  if (age) params.set('age', age);
  if (ranked.length) params.set('goals', ranked.join(','));
  if (hasIns) params.set('benefits', 'verified');
  if (budgetPref) params.set('budget', budgetPref);
  if (expLevel) params.set('exp', expLevel);
  // Pass activated tags and conditions for products page filtering
  if (activatedTags.length) params.set('tags', activatedTags.join(','));
  if (activatedConditions.length) params.set('conditions', encodeURIComponent(activatedConditions.join(',')));
  location.href = 'products.html?' + params.toString();
}

function pushToZoho() {
  var lid = sGet('beim_lead_id') || null;
  if (!email && !lid) return;

  var tx = chatLog.map(function(e) {
    var d = new Date(e.t);
    return '[' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + '] ' + (e.r === 'user' ? 'User' : 'Navigator') + ': ' + e.m;
  }).join('\n');

  var top3Labels = ranked.map(function(tag) { return (GOAL_META[tag] || {}).short || tag });

  var payload = {
    first_name: firstName, last_name: lastName, employer: employer, navigator: nav,
    source: 'goals_page', page: 'goals', acct_type: acct, balance: bal,
    chat_transcript: tx,
    health_goal_1: top3Labels[0] || null,
    health_goal_2: top3Labels[1] || null,
    health_goal_3: top3Labels[2] || null,
    health_sub_goals: activatedConditions.slice(0, 10).join(', ') || null,
    goals_completed: STEP >= 10,
    age: age || null,
  };
  if (email) payload.email = email;
  if (lid) payload.lead_id = lid;

  try {
    fetch(WORKER_URL + '/api/beim-lead', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function(r) { return r.json() }).then(function(d) {
      if (d.lead_id) sSet('beim_lead_id', d.lead_id);
    }).catch(function() {});
  } catch(e) {}
}
