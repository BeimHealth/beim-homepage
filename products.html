<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Unlocking Session — Beim Health</title>
<meta name="description" content="Your Care Navigator walks you through clinically graded, HSA/FSA-eligible products matched to your goals, insurance, and budget."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060610;--card:rgba(16,16,32,.65);--border:rgba(255,255,255,.07);--cy:#6ee0f5;--pu:#7c6af0;--bl:#6aa3f3;--gn:#3dd9b6;--gd:#f59e0b;--rd:#ef4444;--tx:#f0f0ff;--mu:#8a8da8;--dm:#5a5d78;--radius:20px;--radius-s:14px;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column}
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:160%;height:160%;top:-30%;left:-30%;background:radial-gradient(ellipse 700px 600px at 20% 15%,rgba(124,106,240,.06),transparent 70%),radial-gradient(ellipse 500px 400px at 80% 70%,rgba(110,224,245,.04),transparent 70%);animation:meshDrift 35s ease-in-out infinite alternate}
@keyframes meshDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,-15px) scale(1.02)}}
.noise{position:fixed;inset:0;z-index:0;opacity:.014;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px 128px}
.chat-app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:720px;margin:0 auto;width:100%}
.chat-header{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;backdrop-filter:blur(20px);background:rgba(6,6,16,.88)}
.ch-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--mu);text-decoration:none;font-size:14px;transition:all .2s;flex-shrink:0}
.ch-back:hover{border-color:rgba(255,255,255,.15);color:var(--tx)}
.ch-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0}
.ch-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ch-avatar-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--gn);border:2px solid rgba(6,6,16,.9)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;color:#fff}
.ch-status{font-size:11px;color:var(--gn);font-weight:600}
.step-indicator{display:flex;align-items:center;gap:6px;flex-shrink:0}
.step-dot{width:28px;height:4px;border-radius:4px;background:rgba(255,255,255,.06);transition:all .4s var(--ease)}
.step-dot.done{background:var(--gn)}
.step-dot.active{background:linear-gradient(90deg,var(--cy),var(--pu));width:40px;box-shadow:0 0 12px rgba(110,224,245,.15)}
.messages{flex:1;overflow-y:auto;padding:20px 24px 120px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
.msg{display:flex;gap:10px;animation:msgIn .4s var(--ease) both;max-width:100%}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-avatar.you{background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--mu);font-weight:600}
.bubble{font-size:14px;line-height:1.7;padding:12px 16px;border-radius:18px;max-width:92%;position:relative}
.bubble.nav{color:rgba(240,240,255,.85);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.bubble.nav.ev{background:rgba(110,224,245,.04);border-color:rgba(110,224,245,.1)}
.bubble.nav.br{background:rgba(124,106,240,.04);border-color:rgba(124,106,240,.1)}
.bubble.usr{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,255,.75)}
.typing-dots{display:flex;gap:4px;padding:12px 16px;border-radius:18px;align-items:center}
.typing-dots.ev{background:rgba(110,224,245,.04);border:1px solid rgba(110,224,245,.1)}
.typing-dots.br{background:rgba(124,106,240,.04);border:1px solid rgba(124,106,240,.1)}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:rgba(240,240,255,.25);animation:dotP 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotP{0%,60%,100%{opacity:.25;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.phone-capture{margin-top:10px;padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)}
.phone-capture .pc-label{font-size:12px;font-weight:700;color:var(--cy);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.phone-capture .pc-label span{font-size:14px}
.phone-capture .pc-row{display:flex;gap:8px;align-items:center}
.phone-capture .pc-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s}
.phone-capture .pc-input:focus{border-color:rgba(110,224,245,.3)}
.phone-capture .pc-input::placeholder{color:var(--dm)}
.phone-capture .pc-input.err{border-color:var(--rd)}
.phone-capture .pc-send{padding:12px 20px;border-radius:12px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.phone-capture .pc-send:hover{box-shadow:0 4px 20px rgba(124,106,240,.3)}
.phone-capture .pc-send:disabled{opacity:.4;pointer-events:none}
.phone-capture .pc-send.loading{pointer-events:none;opacity:.6}
.phone-capture .pc-consent{display:flex;align-items:flex-start;gap:8px;margin-top:8px}
.phone-capture .pc-consent input[type="checkbox"]{margin-top:3px;accent-color:var(--cy);width:14px;height:14px;flex-shrink:0}
.phone-capture .pc-consent label{font-size:10px;color:var(--dm);line-height:1.5;cursor:pointer}
.phone-capture .pc-err{font-size:11px;color:var(--rd);margin-top:6px;min-height:16px}
.phone-capture .pc-skip{background:none;border:none;color:var(--dm);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;text-decoration:underline;padding:0}
.phone-capture .pc-skip:hover{color:var(--mu)}
.phone-capture .pc-done{display:flex;align-items:center;gap:8px;color:var(--gn);font-size:13px;font-weight:600}
.phone-capture .pc-done span{font-size:16px}
.age-capture{margin-top:10px;padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)}
.age-capture .ac-label{font-size:12px;font-weight:700;color:var(--cy);margin-bottom:8px}
.age-capture .ac-row{display:flex;gap:8px;align-items:center}
.age-capture .ac-input{width:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;font-family:'DM Mono',monospace;font-size:16px;color:#fff;outline:none;text-align:center;transition:border-color .2s}
.age-capture .ac-input:focus{border-color:rgba(110,224,245,.3)}
.age-capture .ac-input::placeholder{color:var(--dm)}
.age-capture .ac-btn{padding:12px 20px;border-radius:12px;background:linear-gradient(135deg,var(--cy),var(--bl));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.age-capture .ac-btn:hover{box-shadow:0 4px 20px rgba(110,224,245,.3)}
.age-capture .ac-skip{background:none;border:none;color:var(--dm);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;margin-top:6px;text-decoration:underline;padding:0}
.screening-check{margin-top:10px;padding:14px;border-radius:14px;background:rgba(61,217,182,.03);border:1px solid rgba(61,217,182,.12)}
.screening-check .sc-title{font-size:12px;font-weight:700;color:var(--gn);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.screening-check .sc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.screening-check .sc-item:last-child{border-bottom:none}
.screening-check .sc-item input[type="checkbox"]{accent-color:var(--gn);width:16px;height:16px;flex-shrink:0}
.screening-check .sc-item label{font-size:13px;color:rgba(240,240,255,.75);cursor:pointer;flex:1}
.screening-check .sc-item .sc-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(61,217,182,.1);color:var(--gn);white-space:nowrap}
.screening-check .sc-done{margin-top:10px;padding:10px 20px;border-radius:12px;background:linear-gradient(135deg,var(--gn),var(--cy));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}
.screening-check .sc-done:hover{box-shadow:0 4px 20px rgba(61,217,182,.3)}
.procure-card{margin-top:10px;padding:14px;border-radius:14px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15)}
.procure-card .pr-title{font-size:12px;font-weight:700;color:var(--gd);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.procure-card .pr-text{font-size:13px;color:rgba(240,240,255,.7);line-height:1.6;margin-bottom:10px}
.procure-card .pr-row{display:flex;gap:8px;align-items:center}
.procure-card .pr-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;outline:none}
.procure-card .pr-input::placeholder{color:var(--dm)}
.procure-card .pr-budget{width:100px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:13px;color:#fff;outline:none;text-align:center}
.procure-card .pr-btn{padding:10px 18px;border-radius:12px;background:linear-gradient(135deg,var(--gd),#e08a00);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.phase-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);margin-bottom:8px}
.phase-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.phase-icon.ins{background:rgba(61,217,182,.1);border:1px solid rgba(61,217,182,.2)}
.phase-icon.prev{background:rgba(61,217,182,.12);border:1px solid rgba(61,217,182,.25)}
.phase-icon.hsa{background:rgba(110,224,245,.08);border:1px solid rgba(110,224,245,.18)}
.phase-icon.perf{background:rgba(124,106,240,.08);border:1px solid rgba(124,106,240,.18)}
.phase-title{font-size:14px;font-weight:800;color:#fff}
.phase-sub{font-size:10px;color:var(--dm);margin-top:1px}
.phase-badge{margin-left:auto;font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px}
.phase-badge.green{background:rgba(61,217,182,.08);border:1px solid rgba(61,217,182,.18);color:var(--gn)}
.phase-badge.cyan{background:rgba(110,224,245,.06);border:1px solid rgba(110,224,245,.15);color:var(--cy)}
.order-fee-banner{margin-top:8px;padding:10px 14px;border-radius:12px;background:rgba(61,217,182,.06);border:1px solid rgba(61,217,182,.15);display:flex;align-items:center;gap:10px}
.order-fee-banner .ofb-icon{font-size:18px;flex-shrink:0}
.order-fee-banner .ofb-text{font-size:12px;color:rgba(240,240,255,.7);line-height:1.5}
.order-fee-banner .ofb-text strong{color:var(--gn)}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.prod-card{background:rgba(8,8,18,.6);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s var(--ease);position:relative}
.prod-card:hover{border-color:rgba(255,255,255,.16);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.prod-card.selected{border-color:rgba(61,217,182,.3);background:rgba(61,217,182,.03)}
.prod-check{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .2s;z-index:2}
.prod-card.selected .prod-check{background:var(--gn);border-color:var(--gn);color:#fff}
.prod-img{width:100%;height:85px;background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.04)}
.prod-img img{width:100%;height:100%;object-fit:contain;padding:6px}
.prod-img .prod-emoji{font-size:28px;opacity:.35}
.prod-body{padding:10px}
.conf-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.conf-bar{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
.conf-fill{height:100%;border-radius:3px}
.conf-fill.hi{background:var(--gn)}.conf-fill.md{background:var(--cy)}.conf-fill.lo{background:var(--gd)}
.conf-pct{font-family:'DM Mono',monospace;font-size:9px;font-weight:700}
.conf-pct.hi{color:var(--gn)}.conf-pct.md{color:var(--cy)}.conf-pct.lo{color:var(--gd)}
.prod-badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.pb{font-size:7px;font-weight:700;padding:2px 5px;border-radius:4px;text-transform:uppercase;white-space:nowrap}
.pb.ga{background:rgba(61,217,182,.1);border:1px solid rgba(61,217,182,.25);color:var(--gn)}
.pb.gb{background:rgba(106,163,243,.08);border:1px solid rgba(106,163,243,.2);color:var(--bl)}
.pb.gc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--mu)}
.pb.ins0{background:rgba(61,217,182,.14);border:1px solid rgba(61,217,182,.35);color:#fff;font-weight:800}
.pb.prev0{background:rgba(61,217,182,.18);border:1px solid rgba(61,217,182,.4);color:#fff;font-weight:800}
.pb.hsa{background:rgba(110,224,245,.06);border:1px solid rgba(110,224,245,.18);color:var(--cy)}
.pb.lmn{background:var(--pu);color:#fff}
.pb.order{background:rgba(61,217,182,.12);border:1px solid rgba(61,217,182,.3);color:var(--gn)}
.pb.pool{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);color:var(--gd)}
.pb.fit{background:rgba(61,217,182,.08);border:1px solid rgba(61,217,182,.2);color:var(--gn)}
.pb.over{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);color:var(--gd)}
.pb.drhi{background:rgba(124,106,240,.1);border:1px solid rgba(124,106,240,.25);color:var(--pu)}
.pb.goal{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--gd)}
.prod-name{font-size:11px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:2px}
.prod-brand{font-size:9px;color:var(--dm);margin-bottom:3px}
.prod-hl{font-size:9px;color:rgba(240,240,255,.4);line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-price-row{display:flex;align-items:baseline;gap:4px}
.prod-price{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:#fff}
.prod-free{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--gn)}
.prod-strike{font-size:9px;color:var(--dm);text-decoration:line-through}
.prod-lmn-note{font-size:8px;color:var(--pu);margin-top:3px;font-weight:600}
.prod-order-note{font-size:8px;color:var(--gn);margin-top:3px;font-weight:600}
.action-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:11px 22px;border-radius:100px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .25s var(--ease)}
.action-btn:hover{box-shadow:0 6px 28px rgba(124,106,240,.3);transform:translateY(-1px)}
.action-btn:disabled{opacity:.3;pointer-events:none}
.action-btn.locked{pointer-events:none;opacity:.35}
.action-btn.secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
.action-btn.secondary:hover{background:rgba(255,255,255,.1)}
.checkin-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.checkin-btn{padding:9px 18px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--tx)}
.checkin-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.checkin-btn.primary{background:linear-gradient(135deg,var(--pu),var(--bl));border:none;color:#fff;font-weight:700}
.checkin-btn.primary:hover{box-shadow:0 4px 16px rgba(124,106,240,.3)}
.checkin-btn.green{background:linear-gradient(135deg,var(--gn),var(--cy));border:none;color:#fff;font-weight:700}
.input-bar{flex-shrink:0;display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.06);background:rgba(6,6,16,.92);backdrop-filter:blur(20px);padding:4px 8px}
.input-field{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;padding:14px 16px}
.input-field::placeholder{color:var(--dm)}
.send-btn{background:none;border:none;padding:14px 16px;cursor:pointer;font-size:16px;color:var(--dm);transition:color .2s}
.send-btn:hover{color:var(--cy)}
.tally-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;transform:translateY(100%);transition:transform .35s var(--ease);background:rgba(10,10,20,.96);backdrop-filter:blur(24px);border-top:1px solid rgba(124,106,240,.18);padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.tally-bar.visible{transform:translateY(0)}
.tally-stat{text-align:center}
.tally-num{font-family:'DM Mono',monospace;font-size:15px;font-weight:700}
.tally-num.green{color:var(--gn)}.tally-num.cyan{color:var(--cy)}.tally-num.white{color:#fff}
.tally-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.tally-div{width:1px;height:20px;background:rgba(255,255,255,.08)}
.tally-cta{padding:11px 24px;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tally-cta:hover{box-shadow:0 6px 24px rgba(124,106,240,.4)}
.tally-clear{background:none;border:1px solid rgba(255,255,255,.1);color:var(--dm);padding:11px 14px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;cursor:pointer}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){.messages{padding:16px 16px 120px}.chat-header{padding:12px 16px}.bubble{font-size:13px;padding:10px 14px;max-width:95%}.prod-grid{grid-template-columns:1fr}.step-indicator{display:none}.tally-bar{padding:10px 16px;gap:10px}}
</style>
</head>
<body>
<div class="bg-mesh"></div><div class="noise"></div>
<div class="chat-app">
  <div class="chat-header">
    <a class="ch-back" href="goals.html" title="Back">&larr;</a>

function getAIReaction(productStep,extraUI,callback){

  else if(productStep==='phase_gaps'){var shown=new Set();allProducts.forEach(function(p){if(p._insMatch||p._prevMatch||p._goalMatch)shown.add(p.product_name)});topProducts=allProducts.filter(function(p){return!shown.has(p.product_name)&&p._score>10}).slice(0,4).map(function(p){return p.product_name})}

  var ctx={
    page:'products',productStep:productStep,
    firstName:firstName,employer:employer,
    balance:bal,acctType:acct,deadline:deadline,
    goals:userGoals,age:userAge,
    wellbeing:{life:wbLife,energy:wbEnergy},
    budgetPref:budgetPref,expLevel:expLevel,
    hasInsurance:hasIns,
    selectedCount:selectedProducts.length,
    selectedNames:selectedProducts.map(function(p){return p.product_name}).join(', '),
    matchedCount:allProducts.filter(function(p){return p._score>10}).length,
    preventativeCount:preventativeMatches.length,
    topProductNames:topProducts.join(', '),
    hsaRemaining:Math.max(0,bal-getHsaAllocated()),
    insValue:selectedProducts.filter(function(p){return p._insMatch||p._prevMatch}).reduce(function(s,p){return s+p._price},0),
    hsaDeployed:selectedProducts.filter(function(p){return!p._insMatch&&!p._prevMatch}).reduce(function(s,p){return s+p._price},0)
  };

  var controller=new AbortController();
  var timeout=setTimeout(function(){controller.abort()},4000);

  fetch(W+'/api/chat',{
    method:'POST',signal:controller.signal,
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:'[productStep:'+productStep+']',history:chatHistory.slice(-6),navigator:nav,context:ctx})
  })
  .then(function(r){clearTimeout(timeout);return r.json()})

    var reply=d.reply||FALLBACKS[productStep]||'Let\u2019s keep going.';

}

/* ── CSV ── */
function loadCSV(){
  fetch(CSV_URL).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}).then(function(csv){
    allProducts=parseCSV(csv);
    if(!allProducts.length){addNavBubble("Couldn't load products. Try refreshing.");return}
    scoreAllProducts();
    startSession();
  }).catch(function(e){console.error('CSV failed:',e);addNavBubble("Product catalog couldn't load \u2014 try refreshing the page.")});
}
function parseCSV(text){
  var lines=text.split('\n');if(lines.length<2)return[];
  var headers=csvLine(lines[0]),out=[];
  var skip=['Orders-','Admission-','Order to Enter','Handicap Placard','Wig Orders','Artificial Limb','Artificial Teeth','Wheelchair Orders','Mail Order Lab','In-Facility Lab','HRT Replacement'];
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    var vals=csvLine(lines[i]),r={};
    for(var j=0;j<headers.length;j++)r[headers[j]]=vals[j]||'';
    var nm=r.product_name||'';if(skip.some(function(s){return nm.indexOf(s)>-1}))continue;
    var act=(r.product_active||'').replace(/['"]/g,'').trim().toUpperCase();
    if(act!=='TRUE'&&act!=='YES'&&act!=='1')continue;
    var priceStr=(r.price||'').replace(/[$,]/g,'').trim();
    var price=parseFloat(priceStr);if(!price||price<=0)continue;
    r._price=price;
    r.hsa_fsa_eligible=(r.hsa_fsa_eligible||'').replace(/['"]/g,'').trim();
    r.requires_medical_necessity=(r.requires_medical_necessity||'').replace(/['"]/g,'').trim();
    r.community_pool=(r.community_pool||'').replace(/['"]/g,'').trim();
    r.physician_order_required=(r.physician_order_required||'').replace(/['"]/g,'').trim();
    r.insurance_matchable=(r.insurance_matchable||'').replace(/['"]/g,'').trim();
    out.push(r);
  }
  return out;
}
function csvLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}

/* ── SCORING with PREVENTATIVE CODE MATCHING ── */
function scoreAllProducts(){
  preventativeMatches=[];
  allProducts.forEach(function(p){
    var score=0;
    var ut=(p.uspstf_screening_tags||'').split('|').filter(Boolean);
    var ur=(p.uspstf_age_sex_rules||'').split('|').filter(Boolean);
    p._insMatch=false;p._prevMatch=false;p._prevCode=null;

    // Layer 1: USPSTF Preventative Code Match
    var prodName=(p.product_name||'').toLowerCase();
    for(var ci=0;ci<PREVENTATIVE_CODES.length;ci++){
      var code=PREVENTATIVE_CODES[ci];
      var patterns=code.product_match.split('|');
      var matched=false;
      for(var pi=0;pi<patterns.length;pi++){
        if(prodName.indexOf(patterns[pi].toLowerCase())>-1){matched=true;break}
      }
      if(matched&&userAge){
        if(userAge>=code.rules.age_min&&userAge<=code.rules.age_max&&!completedScreenings[code.category]){
          p._prevMatch=true;p._prevCode=code;p._insMatch=true;score+=60;
          preventativeMatches.push(p);break;
        }
      }
    }
    // Original USPSTF tag matching
    if(!p._prevMatch&&ut.length&&(userAge||ins)){
      for(var i=0;i<ut.length;i++){
        var rule=ur[i]||'',parts=rule.split(':'),sex=parts[0]||'all',ageRange=(parts[1]||'0-99').split('-');
        var sexOk=sex==='all'||(sex==='female'&&userSex==='F')||(sex==='male'&&userSex==='M');
        var ageOk2=!userAge||(userAge>=+ageRange[0]&&userAge<=+ageRange[1]);
        if(sexOk&&ageOk2){p._insMatch=true;score+=50;break}
      }
    }
    var gt=(p.goal_tags||'').split('|').map(function(t){return t.trim()}).filter(Boolean);
    p._goalMatch=false;p._goalRank=99;
    for(var gi=0;gi<userGoals.length;gi++){
      var mapped=GOAL_MAP[userGoals[gi]]||[];
      for(var mi=0;mi<mapped.length;mi++){
        if(gt.indexOf(mapped[mi])>-1){p._goalMatch=true;p._goalRank=Math.min(p._goalRank,gi);score+=[35,22,12][gi]||5;break}
      }
      if(p._goalMatch)break;
    }
    if(p._price<=bal&&!p._insMatch)score+=8;
    var grade=(p.grade||'').trim();
    score+=Math.round((grade==='A'?20:grade==='B'?12:grade==='C'?5:0)*(grade==='A'?1.5:grade==='B'?1.2:1.0));
    var dc=(p.doctor_confidence||'').trim();
    score+=dc==='Very High'?15:dc==='High'?10:dc==='Moderate'?5:0;
    if((wbLife+wbEnergy)/2<=5){if(gt.some(function(t){return HAPPINESS_CATS.indexOf(t)>-1}))score=Math.round(score*1.2)}
    var genderApp=(p.gender_applicability||'a')[0].toLowerCase();
    if(genderApp!=='a'&&userSex!=='all'&&genderApp!==(userSex==='F'?'f':'m'))score=-999;
    p._score=score;
  });
  allProducts.sort(function(a,b){return b._score-a._score});
}
function confScore(p){
  var s=0;var g=(p.grade||'').trim();
  s+=g==='A'?35:g==='B'?22:g==='C'?10:0;
  var dc=(p.doctor_confidence||'').trim();
  s+=dc==='Very High'?25:dc==='High'?18:dc==='Moderate'?10:5;
  if(p._goalMatch)s+=20;if(p._insMatch||p._prevMatch)s+=15;
  if(p.hsa_fsa_eligible==='Yes')s+=5;
  return Math.min(99,Math.max(15,s));
}

        else if(v.length>=4)this.value='('+v.substring(0,3)+') '+v.substring(3);
        else if(v.length>0)this.value='('+v;
        else this.value='';
      });
      inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();submitPhone()}});
      inp.focus();

function formatPhoneE164(raw){
  var digits=raw.replace(/\D/g,'');
  if(digits.length===11&&digits[0]==='1')digits=digits.substring(1);
  if(digits.length!==10)return null;
  return'+1'+digits;
}
function submitPhone(){
  var raw=document.getElementById('pcPhone').value.trim();
  var agreed=document.getElementById('pcChk').checked;
  var phone=formatPhoneE164(raw);
  var errEl=document.getElementById('pcErr');
  var btn=document.getElementById('pcSend');
  if(!phone){document.getElementById('pcPhone').classList.add('err');errEl.textContent='Enter a valid 10-digit US number';return}
  if(!agreed){errEl.textContent='Please agree to receive texts';return}

/* ── SCREENING HISTORY CHECK ── */
function showScreeningCheck(afterCallback){
  var matchedCodes=[],seen={};
  for(var i=0;i<PREVENTATIVE_CODES.length;i++){
    var code=PREVENTATIVE_CODES[i];
    if(seen[code.category])continue;
    if(userAge&&userAge>=code.rules.age_min&&userAge<=code.rules.age_max){
      matchedCodes.push(code);seen[code.category]=true;
    }
  }
  if(!matchedCodes.length){if(afterCallback)afterCallback();return}

  var html="Based on your age, your insurance should cover several screenings at <strong>$0</strong> under federal preventative care guidelines. Quick check \u2014 have you already completed any of these in the past year? I don\u2019t want to recommend something you\u2019ve already done.";
  html+='<div class="screening-check" id="screeningCheck">';
  html+='<div class="sc-title"><span>\uD83D\uDEE1\uFE0F</span> Recent screenings (check any you\u2019ve had)</div>';
  for(var j=0;j<matchedCodes.length;j++){
    html+='<div class="sc-item"><input type="checkbox" id="sc_'+j+'" data-cat="'+matchedCodes[j].category+'"/>';
    html+='<label for="sc_'+j+'">'+matchedCodes[j].screening_question+'</label>';
    html+='<span class="sc-tag">USPSTF '+matchedCodes[j].uspstf_grade+'</span></div>';
  }
  html+='<button class="sc-done" onclick="submitScreenings()">Show me what\u2019s available \u2192</button>';
  html+='</div>';
  addNavBubble(html);
  window._screeningAfterCallback=afterCallback;
}
function submitScreenings(){
  var checks=document.querySelectorAll('#screeningCheck input[type="checkbox"]');
  var completed=[];
  checks.forEach(function(chk){if(chk.checked){var cat=chk.getAttribute('data-cat');completedScreenings[cat]=true;completed.push(cat)}});
  scoreAllProducts();
  var capEl=document.getElementById('screeningCheck');
  if(completed.length>0){
    if(capEl)capEl.innerHTML='<div style="color:var(--gn);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px"><span>\u2705</span> Noted \u2014 I won\u2019t recommend '+completed.length+' screening'+(completed.length>1?'s':'')+' you\u2019ve already had.</div>';
    addUserBubble("Already had: "+completed.join(', '));
  } else {
    if(capEl)capEl.innerHTML='<div style="color:var(--gn);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px"><span>\u2705</span> No recent screenings \u2014 let\u2019s see what your insurance covers at $0.</div>';
  }
  if(window._screeningAfterCallback){setTimeout(window._screeningAfterCallback,1000);window._screeningAfterCallback=null}
}

/* ── PHASE 0: PREVENTATIVE ($0 + Physician Order) ── */
function runPhasePreventative(){
  PHASE=0;
  var prevProducts=preventativeMatches.filter(function(p){return p._score>0});
  if(!prevProducts.length){runPhase1();return}
  var totalValue=0;prevProducts.forEach(function(p){totalValue+=p._price});
  var header='<div class="phase-hdr"><div class="phase-icon prev">\uD83C\uDFE5</div><div><div class="phase-title">Preventative Care \u2014 $0 with Insurance</div><div class="phase-sub">USPSTF Grade A/B \u2014 covered under federal guidelines</div></div><span class="phase-badge green">$'+totalValue.toLocaleString()+' covered</span></div>';
  var feeBanner='<div class="order-fee-banner"><div class="ofb-icon">\uD83D\uDCCB</div><div class="ofb-text">These products are <strong>$0</strong> through your insurance. A <strong>$'+PHYSICIAN_ORDER_FEE+' physician order fee</strong> applies (one fee covers all preventative items). The order fee is <strong>100% '+acct+' eligible</strong> and covers your physician signing the necessary orders and ICD-10 coding for your insurance claim.</div></div>';
  var cards=buildProductCards(prevProducts,true);
  getAIReaction('phase_preventative',header+feeBanner+cards,function(){
    setTimeout(function(){
      var btns='<div class="checkin-btns"><button class="checkin-btn green" onclick="advanceToPhase(1)">Show insurance unlocks \u2192</button><button class="checkin-btn" onclick="askQuestion()">I have a question</button></div>';
      getAIReaction('checkin_1',btns);
    },2000);
  });
}

/* ── PHASE 1: Insurance Unlocks ── */
function runPhase1(){
  PHASE=1;
  var insProducts=allProducts.filter(function(p){return p._insMatch&&!p._prevMatch&&p._score>0});
  if(!insProducts.length){
    addNavBubble("No additional insurance-matched products for your profile. Let\u2019s move to your "+acct+".");
    setTimeout(function(){checkIn(2)},1500);return;
  }
  var show=insProducts.slice(0,5);
  var totalValue=0;show.forEach(function(p){totalValue+=p._price});
  var header='<div class="phase-hdr"><div class="phase-icon ins">\uD83D\uDEE1\uFE0F</div><div><div class="phase-title">Insurance Unlocks</div><div class="phase-sub">Covered at $0 \u2014 use insurance, save your '+acct+'</div></div><span class="phase-badge green">'+show.length+' unlocked</span></div>';
  var cards=buildProductCards(show);
  getAIReaction('phase_insurance',header+cards,function(){
    setTimeout(function(){checkIn(2)},2000);
  });
}

/* ── PHASE 2: HSA Optimization ── */
function runPhase2(){
  PHASE=2;
  var remaining=bal-getHsaAllocated();
  var hsaProducts=allProducts.filter(function(p){
    return!p._insMatch&&!p._prevMatch&&p._score>0&&p._goalMatch&&p.hsa_fsa_eligible==='Yes'&&p._price<=remaining+100;
  }).slice(0,5);
  if(!hsaProducts.length){
    addNavBubble("No "+acct+"-matched products fit your current budget. Let\u2019s look at performance gaps.");
    setTimeout(function(){checkIn(3)},1500);return;
  }
  var header='<div class="phase-hdr"><div class="phase-icon hsa">\uD83D\uDCB3</div><div><div class="phase-title">'+acct+' Optimization</div><div class="phase-sub">Deploy tax-free dollars on your top goals</div></div><span class="phase-badge cyan">$'+Math.round(remaining)+' available</span></div>';
  var cards=buildProductCards(hsaProducts);
  getAIReaction('phase_hsa',header+cards,function(){
    setTimeout(function(){checkIn(3)},2000);
  });
}

/* ── PHASE 3: Performance Gaps ── */
function runPhase3(){
  PHASE=3;
  var alreadyShown=new Set();
  allProducts.forEach(function(p){if(p._insMatch||p._prevMatch||p._goalMatch)alreadyShown.add(p.product_name)});
  var gapProducts=allProducts.filter(function(p){return!alreadyShown.has(p.product_name)&&p._score>10}).slice(0,5);
  if(!gapProducts.length){checkIn('finish');return}
  var header='<div class="phase-hdr"><div class="phase-icon perf">\u26A1</div><div><div class="phase-title">Performance Gaps</div><div class="phase-sub">High-value products beyond your stated goals</div></div></div>';
  var cards=buildProductCards(gapProducts);
  getAIReaction('phase_gaps',header+cards,function(){
    setTimeout(function(){checkIn('finish')},2000);
  });
}

/* ── CHECK-INS ── */
function checkIn(nextPhase){
  var step=nextPhase===2?'checkin_1':nextPhase===3?'checkin_2':'summary';
  if(step==='summary'){finishSession();return}
  var btnLabel=nextPhase===2?'Show me '+acct+' picks \u2192':'Show performance gaps \u2192';
  var btnNext=nextPhase===2?'advanceToPhase(2)':'advanceToPhase(3)';
  var btns='<div class="checkin-btns"><button class="checkin-btn primary" onclick="'+btnNext+'">'+btnLabel+'</button><button class="checkin-btn" onclick="askQuestion()">I have a question</button></div>';
  getAIReaction(step,btns);
}
function advanceToPhase(phase){
  lockBtns();addUserBubble('Continue');
  if(phase===1)runPhase1();else if(phase===2)runPhase2();else if(phase===3)runPhase3();
}
function askQuestion(){
  lockBtns();
  addNavBubble("Go ahead \u2014 ask me about any product, whether something should be on insurance vs "+acct+", how physician orders work, or anything else.");
  document.getElementById('chatInput').focus();
}

/* ── PRODUCT CARD BUILDER ── */
function buildProductCards(products,isPreventative){
  if(!products.length)return'';
  var html='<div class="prod-grid">';
  products.forEach(function(p){
    var cs=confScore(p),cl=cs>=75?'hi':cs>=55?'md':'lo';
    var isSel=selectedProducts.some(function(s){return s.product_name===p.product_name});
    var badges='';
    var grade=(p.grade||'B').trim();
    badges+='<span class="pb g'+grade.toLowerCase()+'">'+grade+'</span>';
    if(p._prevMatch){
      badges+='<span class="pb prev0">\uD83C\uDFE5 $0 Preventative</span>';
      badges+='<span class="pb order">\uD83D\uDCCB Order $'+PHYSICIAN_ORDER_FEE+'</span>';
    } else if(p._insMatch){
      badges+='<span class="pb ins0">\uD83D\uDEE1\uFE0F $0</span>';
    }
    if(p._goalMatch)badges+='<span class="pb goal">\uD83C\uDFAF Goal #'+(p._goalRank+1)+'</span>';
    if(!p._insMatch&&!p._prevMatch&&p._price<=bal)badges+='<span class="pb fit">\u2713 Fits</span>';
    else if(!p._insMatch&&!p._prevMatch&&p._price>bal&&p._price<=bal+100)badges+='<span class="pb over">+$'+Math.round(p._price-bal)+'</span>';
    var dc=(p.doctor_confidence||'').trim();
    if(dc==='Very High')badges+='<span class="pb drhi">\uD83E\uDE7A Top Pick</span>';
    var needsLmn=p.requires_medical_necessity==='Yes';
    var needsOrder=(p.physician_order_required||'').toLowerCase()==='yes';
    if(needsLmn&&!p._prevMatch)badges+='<span class="pb lmn">\uD83D\uDCCB LMN</span>';
    else if(needsOrder&&!p._prevMatch)badges+='<span class="pb order">\uD83D\uDCCB Order</span>';
    else if(p.hsa_fsa_eligible==='Yes'&&!p._prevMatch)badges+='<span class="pb hsa">'+acct+'</span>';
    if((p.community_pool||'').toUpperCase()==='TRUE')badges+='<span class="pb pool">\uD83E\uDD1D Pool</span>';
    var priceHtml=(p._prevMatch||p._insMatch)?'<span class="prod-free">$0</span><span class="prod-strike">$'+p._price.toFixed(0)+'</span>':'<span class="prod-price">$'+p._price.toFixed(0)+'</span>';
    var imgUrl=p.product_image_url||'';
    var imgHtml=imgUrl&&!imgUrl.includes('shopify.com/store')?'<img src="'+esc(imgUrl)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<span class=prod-emoji>\uD83C\uDFE5</span>\'"/>':'<span class="prod-emoji">\uD83C\uDFE5</span>';
    var safeName=esc(p.product_name||'').replace(/'/g,"\\'");
    var noteLine='';
    if(p._prevMatch)noteLine='<div class="prod-order-note">\uD83C\uDFE5 $0 with insurance \u2022 '+p._prevCode.icd10_screening+' \u2022 Physician order required</div>';
    else if(needsLmn)noteLine='<div class="prod-lmn-note">Beim generates your LMN automatically \u2022 $'+LMN_FEE+'</div>';
    else if(needsOrder)noteLine='<div class="prod-order-note">Physician order required \u2022 $'+PHYSICIAN_ORDER_FEE+' ('+acct+' eligible)</div>';
    html+='<div class="prod-card'+(isSel?' selected':'')+'" onclick="toggleProduct(\''+safeName+'\',this)"><div class="prod-check">\u2713</div><div class="prod-img">'+imgHtml+'</div><div class="prod-body"><div class="conf-row"><div class="conf-bar"><div class="conf-fill '+cl+'" style="width:'+cs+'%"></div></div><span class="conf-pct '+cl+'">'+cs+'%</span></div><div class="prod-badges">'+badges+'</div><div class="prod-name">'+esc(p.product_name||'')+'</div><div class="prod-brand">'+esc(p.brand||'')+'</div><div class="prod-hl">'+esc(p.d2c_headline||'')+'</div><div class="prod-price-row">'+priceHtml+'</div>'+noteLine+'</div></div>';
  });
  html+='</div>';
  return html;
}

/* ── TALLY + SELECTION ── */
function toggleProduct(name,card){
  var p=allProducts.find(function(x){return x.product_name===name});if(!p)return;
  var idx=selectedProducts.findIndex(function(s){return s.product_name===name});
  if(idx>-1){selectedProducts.splice(idx,1);if(card)card.classList.remove('selected')}
  else{selectedProducts.push(p);if(card)card.classList.add('selected')}
  document.querySelectorAll('.prod-card').forEach(function(el){
    var nm=el.querySelector('.prod-name');if(!nm)return;
    el.classList.toggle('selected',selectedProducts.some(function(s){return s.product_name===nm.textContent}));
  });
  updateTally();
}
function updateTally(){
  var n=selectedProducts.length,insVal=0,hsaVal=0,taxSaved=0;
  selectedProducts.forEach(function(p){if(p._insMatch||p._prevMatch)insVal+=p._price;else{hsaVal+=p._price;taxSaved+=Math.round(p._price*TAX_RATE)}});
  document.getElementById('tallyIns').textContent='$'+insVal.toLocaleString();
  document.getElementById('tallyHsa').textContent='$'+hsaVal.toLocaleString();
  document.getElementById('tallyCount').textContent=n;
  document.getElementById('tallyTotal').textContent='$'+(insVal+hsaVal+taxSaved).toLocaleString();
  document.getElementById('tallyBar').classList.toggle('visible',n>0);
}
function getHsaAllocated(){var t=0;selectedProducts.forEach(function(p){if(!p._insMatch&&!p._prevMatch&&p.hsa_fsa_eligible==='Yes')t+=p._price});return t}
function clearSelections(){selectedProducts=[];document.querySelectorAll('.prod-card.selected').forEach(function(c){c.classList.remove('selected')});updateTally()}

/* ── CHAT ── */
function addNavBubble(html){
  chatHistory.push({role:'nav',text:html});chatLog.push({t:Date.now(),r:'nav',m:html.replace(/<[^>]+>/g,'')});
  var img=AVATARS[nav]||AVATARS.brooks,cls=nav==='everly'?'ev':'br';
  var c=document.getElementById('messages'),d=document.createElement('div');d.className='msg';
  d.innerHTML='<div class="msg-avatar"><img src="'+img+'"/></div><div class="bubble nav '+cls+'">'+html+'</div>';
  c.appendChild(d);scrollToBottom();
}
function addUserBubble(text){
  chatHistory.push({role:'user',text:text});chatLog.push({t:Date.now(),r:'user',m:text});
  var c=document.getElementById('messages'),d=document.createElement('div');d.className='msg user';
  d.innerHTML='<div class="msg-avatar you">You</div><div class="bubble usr">'+esc(text)+'</div>';
  c.appendChild(d);scrollToBottom();
}
function showTyping(){
  var img=AVATARS[nav]||AVATARS.brooks,cls=nav==='everly'?'ev':'br';
  var c=document.getElementById('messages'),d=document.createElement('div');d.className='msg';d.id='typingMsg';
  d.innerHTML='<div class="msg-avatar"><img src="'+img+'"/></div><div class="typing-dots '+cls+'"><span></span><span></span><span></span></div>';
  c.appendChild(d);scrollToBottom();
}
function removeTyping(){var el=document.getElementById('typingMsg');if(el)el.remove()}
function scrollToBottom(){var c=document.getElementById('messages');setTimeout(function(){c.scrollTop=c.scrollHeight},60)}
function lockBtns(){document.querySelectorAll('.checkin-btn:not(.locked),.action-btn:not(.locked)').forEach(function(b){b.classList.add('locked');b.disabled=true;b.style.pointerEvents='none';b.style.opacity='.35'})}

function sendFreeText(){
  var input=document.getElementById('chatInput'),text=input.value.trim();if(!text)return;input.value='';
  addUserBubble(text);showTyping();
  var ctx={page:'products',balance:bal,acctType:acct,goals:userGoals,firstName:firstName,gender:userSex,age:userAge,selectedProducts:selectedProducts.map(function(p){return p.product_name}).join(', '),wellbeing:{life:wbLife,energy:wbEnergy},budgetPref:budgetPref,hsaRemaining:Math.max(0,bal-getHsaAllocated()),preventativeCount:preventativeMatches.length};
  fetch(W+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:chatHistory.slice(-8),navigator:nav,context:ctx})})
  .then(function(r){return r.json()}).then(function(d){removeTyping();addNavBubble(d.reply||'Ask me about any product.')})
  .catch(function(){removeTyping();addNavBubble('I hit a snag \u2014 try again.')});
}

/* ── NAVIGATION ── */
function goToIntelligence(){
  if(!selectedProducts.length)return;
  var hasPrev=selectedProducts.some(function(p){return p._prevMatch});
  var prods=selectedProducts.map(function(p){return{name:p.product_name||'',price:p._price||0,grade:(p.grade||'B').trim(),lmn:p.requires_medical_necessity==='Yes',order:(p.physician_order_required||'').toLowerCase()==='yes'||p._prevMatch,hsa:p.hsa_fsa_eligible==='Yes',insured:p._insMatch||false,preventative:p._prevMatch||false,prevCode:p._prevCode?{icd10:p._prevCode.icd10_screening,cpt:p._prevCode.cpt_code,category:p._prevCode.category,grade:p._prevCode.uspstf_grade}:null,pool:(p.community_pool||'').toUpperCase()==='TRUE',brand:p.brand||'',cat:p.category||'',hl:p.d2c_headline||'',goals:p.goal_tags||'',conds:p.conditions||'',stripe_connect_id:p.stripe_connect_id||'',platform_fee_pct:p.platform_fee_pct||'',provider_name:p.provider_name||'',conf:p.doctor_confidence||''}});
  try{sessionStorage.setItem('beim_selected_products',JSON.stringify(prods))}catch(e){}
  if(hasPrev)sSet('beim_physician_order_fee',String(PHYSICIAN_ORDER_FEE));
  pushToZoho();
  var ps=new URLSearchParams();ps.set('balance',bal.toFixed(2));ps.set('acct',acct);ps.set('nav',nav);ps.set('count',selectedProducts.length);
  if(firstName)ps.set('first_name',encodeURIComponent(firstName));
  if(lastName)ps.set('last_name',encodeURIComponent(lastName));
  if(email)ps.set('email',encodeURIComponent(email));
  if(employer)ps.set('employer',encodeURIComponent(employer));
  if(userGoals.length)ps.set('goals',userGoals.join(','));
  if(userAge)ps.set('age',userAge);
  if(hasPrev)ps.set('has_preventative','true');
  location.href='intelligence.html?'+ps.toString();
}
function goMarketplace(){
  var ps=new URLSearchParams();
  if(bal>0)ps.set('balance',bal.toFixed(2));if(acct)ps.set('acct',acct);if(nav)ps.set('nav',nav);
  if(firstName)ps.set('first_name',encodeURIComponent(firstName));if(email)ps.set('email',encodeURIComponent(email));
  location.href='marketplace.html?'+ps.toString();
}
function pushToZoho(){
  var lid=sGet('beim_lead_id')||null;if(!email&&!lid)return;
  var tx=chatLog.map(function(e){var d=new Date(e.t);return'['+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})+'] '+(e.r==='user'?'User':'Navigator')+': '+e.m}).join('\n');
  var prods=selectedProducts.map(function(p){
    var label=p.product_name+' ($'+p._price+')';
    if(p._prevMatch)label+=' [PREVENTATIVE $0 - '+p._prevCode.icd10_screening+']';
    else if(p._insMatch)label+=' [INSURANCE $0]';
    return label;
  }).join(', ');
  var totalValue=0;selectedProducts.forEach(function(p){totalValue+=p._price});
  var hasPrev=selectedProducts.some(function(p){return p._prevMatch});
  var payload={first_name:firstName,last_name:lastName,employer:employer,navigator:nav,source:'unlocking_session',page:'products',acct_type:acct,balance:bal,chat_transcript:tx,products_selected:prods,products_count:selectedProducts.length,rescue_plan_value:totalValue};
  if(email)payload.email=email;if(lid)payload.lead_id=lid;if(phoneNumber)payload.phone=phoneNumber;
  if(userAge)payload.age=userAge;
  var screeningList=Object.keys(completedScreenings).join(', ');
  if(screeningList)payload.screening_history=screeningList;
  if(hasPrev)payload.order_type='Insurance_Preventative';
  try{fetch(W+'/api/beim-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.json()}).then(function(d){if(d.lead_id)sSet('beim_lead_id',d.lead_id)}).catch(function(){})}catch(e){}
}
